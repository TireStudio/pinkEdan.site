                            visibleBlogs.sort((a,b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T'))).map((item, index) => (
                                 <div key={item.id} className="animate-fade-in-up" style={{ animationDelay: `${index * 0.05}s` }}>
                                    <AccordionItem 
                                        title={item.title} subtitle={`${item.date} | ${item.author}`}
                                        content={item.content} pinType={item.pin} heading={item.heading}
                                    />
                                </div>
                            ))
                        ) : (
                            <div className="text-center py-12 bg-white rounded-2xl border border-rose-50">
                                <p className="text-gray-400 font-bold text-sm">公開中の記事はありません</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SectionHero = ({ title, bgText, themeColor }) => {
            const themes = {
                red: { bg: 'from-red-200 via-rose-50 to-red-100', textMain: 'text-red-900', blob1: 'bg-red-300', blob2: 'bg-rose-300' },
                pink: { bg: 'from-fuchsia-200 via-pink-50 to-purple-100', textMain: 'text-fuchsia-900', blob1: 'bg-fuchsia-300', blob2: 'bg-pink-300' },
                orange: { bg: 'from-amber-200 via-orange-50 to-yellow-100', textMain: 'text-orange-900', blob1: 'bg-amber-300', blob2: 'bg-yellow-300' }
            };
            const theme = themes[themeColor] || themes.red;

            const renderShape = () => {
                switch(themeColor) {
                    case 'red': 
                        return <div className="absolute bottom-0 left-0 right-0 h-10 bg-[#FFF5F8]" style={{ clipPath: 'polygon(0 100%, 100% 100%, 100% 0)' }}></div>;
                    case 'pink': 
                        return (
                            <svg className="absolute bottom-0 left-0 right-0 w-full text-[#FFF5F8]" style={{ height: 'auto', minHeight: '30px' }} viewBox="0 0 1440 320" preserveAspectRatio="none">
                                <path fill="currentColor" d="M0,160L48,176C96,192,192,224,288,208C384,192,480,128,576,133.3C672,139,768,213,864,229.3C960,245,1056,203,1152,181.3C1248,160,1344,160,1392,160L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                            </svg>
                        );
                    case 'orange': 
                        return (
                            <svg className="absolute bottom-0 left-0 right-0 w-full text-[#FFF5F8]" style={{ height: 'auto', minHeight: '40px' }} viewBox="0 0 1440 320" preserveAspectRatio="none">
                                 <path fill="currentColor" d="M0,288L1440,128L1440,320L0,320Z"></path>
                            </svg>
                        );
                    default:
                        return <div className="absolute bottom-0 left-0 right-0 h-10 bg-[#FFF5F8]" style={{ clipPath: 'polygon(0 100%, 100% 100%, 100% 0)' }}></div>;
                }
            }

            return (
                <section className="relative h-[45vh] flex items-center justify-center bg-gradient-to-br overflow-hidden mb-12">
                    <div className="absolute inset-0 bg-gradient-to-tr from-pink-400/40 via-rose-300/40 to-amber-300/40 animate-monyu-grad" />
                    <div className="absolute inset-0 bg-white/30 backdrop-blur-[2px]"></div>
                    <div className={`absolute top-0 right-1/4 w-[40vw] h-[40vw] rounded-full mix-blend-multiply filter blur-[80px] opacity-40 animate-monyu ${theme.blob1}`}></div>
                    <div className={`absolute bottom-0 left-1/4 w-[45vw] h-[45vw] rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-monyu animation-delay-2000 ${theme.blob2}`}></div>
                    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[18vw] font-black opacity-[0.05] whitespace-nowrap select-none pointer-events-none z-0 tracking-tighter uppercase font-mono ${theme.textMain}`}>
                        {bgText}
                    </div>
                    {renderShape()}
                    <div className="relative z-10 flex flex-col items-center px-4 max-w-5xl mx-auto w-full animate-fade-in-up">
                        <h1 className={`text-4xl md:text-7xl lg:text-8xl font-black tracking-tighter drop-shadow-sm mb-2 ${theme.textMain} text-center`}>
                            {title}
                        </h1>
                    </div>
                </section>
            );
        };

        const SectionPage = ({ title, bgText, news, schedules, category, themeColor, renderExtra, isFetching, onUpdateSchedule, onTriggerToast }) => {
            const sectionNews = useMemo(() => {
                const now = new Date();
                return news
                    .filter(n => n.category === category && new Date(n.date.replace(' ', 'T')) <= now)
                    .sort((a, b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T')));
            }, [news, category]);

            const textColor = { red: 'text-red-500', pink: 'text-pink-500', orange: 'text-orange-500' }[themeColor];
            const gradientBg = {
                red: 'from-rose-50/90 via-red-50/50 to-white border-red-100',
                pink: 'from-fuchsia-50/90 via-pink-50/50 to-white border-pink-100',
                orange: 'from-amber-50/90 via-orange-50/50 to-white border-orange-100'
            }[themeColor];
            const decorationBlob = { red: 'bg-red-200/40', pink: 'bg-pink-200/40', orange: 'bg-amber-200/40' }[themeColor];

            return (
                <div className="pb-16 overflow-x-hidden">
                    <SectionHero title={title} bgText={bgText} themeColor={themeColor} />
                    <div className="max-w-5xl mx-auto px-4 space-y-12 md:space-y-20">
                        
                        {/* 1. 予定・シフト表 */}
                        <section className="px-1">
                            <ScheduleViewer schedules={schedules} category={category} isHomeMode={false} isFetching={isFetching} onUpdateSchedule={onUpdateSchedule} onTriggerToast={onTriggerToast} />
                        </section>

                        {/* 2. お知らせ */}
                        <section className={`p-6 md:p-12 rounded-3xl bg-gradient-to-br ${gradientBg} border shadow-lg relative overflow-hidden backdrop-blur-sm mx-1`}>
                            <div className={`absolute -right-16 -top-16 w-64 h-64 rounded-full blur-3xl opacity-60 ${decorationBlob}`}></div>
                            <div className={`absolute -left-16 -bottom-16 w-64 h-64 rounded-full blur-3xl opacity-60 ${decorationBlob}`}></div>
                            <div className="relative z-10">
                                 <div className="flex items-end justify-between mb-8 border-b-2 border-rose-100/60 pb-3">
                                    <div>
                                        <h2 className="text-2xl md:text-3xl font-black text-gray-800 tracking-tight">お知らせ</h2>
                                        <p className={`${textColor} text-[10px] md:text-sm tracking-[0.2em] mt-1 font-bold uppercase`}>{category} NEWS</p>
                                    </div>
                                </div>
                                <div className="min-h-[80px]">
                                    {isFetching && sectionNews.length === 0 ? (
                                        <div className="flex justify-center items-center py-6"><Icons.Spinner size={32} /></div>
                                    ) : sectionNews.length > 0 ? (
                                        <div className="space-y-3">
                                            {sectionNews.slice(0, 3).map(item => (
                                                 <AccordionItem key={item.id} title={item.title} subtitle={item.date} content={item.content} pinType={item.pin} category={category} heading={item.heading} />
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center py-12 bg-white/80 rounded-2xl border border-gray-100 shadow-sm">
                                             <p className="text-gray-400 font-bold text-sm">公開中のお知らせはありません</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>
                        
                        {/* 3〜5. メッセージカード、DLリンク、3Dビューアなど */}
                        <section className="px-1">{renderExtra()}</section>
                    </div>
                </div>
            );
        };

        const AdminPage = ({ news, setNews, blogs, setBlogs, schedules, setSchedules, sectionInfo, setSectionInfo, onTriggerToast }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return localStorage.getItem('admin_authenticated') === 'true';
            });
            const [password, setPassword] = useState('');
            const [activeTab, setActiveTab] = useState('add');
            const [targetType, setTargetType] = useState('news');
            const [isLoading, setIsLoading] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [formData, setFormData] = useState({ id: null, pin: 'none', heading: '', date: '', category: '全体', author: '', title: '', content: '', studentId: '' });
            const [scheduleData, setScheduleData] = useState({ id: null, date: '', category: '全体', plan: '', shifts: '' });
            const [sectionData, setSectionData] = useState({});

            useEffect(() => {
                const infoMap = {};
                sectionInfo.forEach(info => { infoMap[info.id] = { ...info }; });
                setSectionData(infoMap);
            }, [sectionInfo]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'momoiro') {
                    setIsAuthenticated(true);
                    localStorage.setItem('admin_authenticated', 'true');
                    onTriggerToast('ログインに成功しました。', 'success');
                } else {
                    onTriggerToast('パスワードが間違っています。', 'error');
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                localStorage.removeItem('admin_authenticated');
                onTriggerToast('ログアウトしました。', 'success');
            };

            const resetForm = () => {
                const now = new Date();
                const tzoffset = now.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);
                const localDateOnly = localISOTime.split('T')[0];
                setFormData({ id: null, pin: 'none', heading: '', date: localISOTime, category: '全体', author: '', title: '', content: '', studentId: '' });
                setScheduleData({ id: null, date: localDateOnly, category: '全体', plan: '', shifts: '' });
            };

            useEffect(() => { setConfirmDeleteId(null); }, [activeTab, targetType]);

            const saveToGAS = async (data, action, typeOverride) => {
                setIsLoading(true);
                const type = typeOverride || targetType;
                const isEditing = data.id !== null && data.id !== undefined && String(data.id).trim() !== '';

                try {
                    if (data.date && type !== 'schedule') data.date = data.date.replace('T', ' '); // 日時
                    
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, type, data }),
                    });
                    if (!response.ok) throw new Error(`GASエラー: ${response.status}`);
                    const resText = await response.text();
                    let resJson;
                    try { resJson = JSON.parse(resText); } catch (e) { throw new Error('レスポンスのパースに失敗しました。'); }

                    if (resJson && resJson.status === 'success') {
                        if (action === 'save') {
                            if (type === 'news') {
                                if (isEditing) setNews(news.map(n => String(n.id) === String(resJson.data.id) ? resJson.data : n));
                                else setNews([resJson.data, ...news]);
                            } else if (type === 'blog') {
                                if (isEditing) setBlogs(blogs.map(b => String(b.id) === String(resJson.data.id) ? resJson.data : b));
                                else setBlogs([resJson.data, ...blogs]);
                            } else if (type === 'schedule') {
                                if (isEditing) setSchedules(schedules.map(s => String(s.id) === String(resJson.data.id) ? resJson.data : s));
                                else setSchedules([resJson.data, ...schedules]);
                            } else if (type === 'section') {
                                setSectionInfo(sectionInfo.map(info => String(info.id) === String(resJson.data.id) ? resJson.data : info));
                            }
                            onTriggerToast('保存しました！', 'success');
                            if (type !== 'section') resetForm();
                        } else if (action === 'delete') {
                            if (type === 'news') setNews(news.filter(n => String(n.id) !== String(data.id)));
                            else if (type === 'blog') setBlogs(blogs.filter(b => String(b.id) !== String(data.id)));
                            else if (type === 'schedule') setSchedules(schedules.filter(s => String(s.id) !== String(data.id)));
                            onTriggerToast('削除を完了しました。', 'success');
                            setConfirmDeleteId(null);
                        }
                    } else {
                        throw new Error(resJson.message || '不明なサーバーエラー。');
                    }
                } catch (error) {
                    onTriggerToast(`同期エラー: ${error.message}`, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (targetType === 'schedule') {
                    const isEditing = scheduleData.id !== null && scheduleData.id !== undefined && String(scheduleData.id).trim() !== '';
                    saveToGAS({ ...scheduleData, id: isEditing ? scheduleData.id : null }, 'save');
                } else {
                    const isEditing = formData.id !== null && formData.id !== undefined && String(formData.id).trim() !== '';
                    saveToGAS({ ...formData, id: isEditing ? formData.id : null }, 'save');
                }
            };

            const handleEdit = (item) => {
                if (targetType === 'schedule') {
                    setScheduleData(item);
                } else {
                    let formattedDate = item.date;
                    if (formattedDate) {
                        const d = new Date(formattedDate.replace(' ', 'T'));
                        if (!isNaN(d.getTime())) {
                            const tzoffset = d.getTimezoneOffset() * 60000;
                            formattedDate = (new Date(d.getTime() - tzoffset)).toISOString().slice(0, 16);
                        }
                    }
                    setFormData({ ...item, date: formattedDate });
                }
                setActiveTab('add');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDeleteClick = (id) => {
                if (confirmDeleteId === id) {
                    saveToGAS({ id }, 'delete');
                } else {
                    setConfirmDeleteId(id);
                    setTimeout(() => { setConfirmDeleteId(prev => prev === id ? null : prev); }, 3000);
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-[80vh] flex items-center justify-center px-4 relative pb-24">
                        <div className="bg-white p-6 md:p-14 rounded-3xl shadow-xl w-full max-w-sm border border-rose-50 relative z-10 animate-fade-in-up">
                            <div className="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <Icons.Lock className="text-white" size={24} />
                            </div>
                            <h2 className="text-2xl font-black text-gray-800 mb-1 text-center tracking-tight">管理者ログイン</h2>
                            <form onSubmit={handleLogin} className="space-y-4 mt-8">
                                <input 
                                    type="password" 
                                    value={password} 
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white transition-all text-center tracking-widest font-bold text-gray-800"
                                    placeholder="PASSWORD"
                                />
                                <button type="submit" className="w-full py-3 bg-gray-900 hover:bg-rose-500 text-white font-bold rounded-xl transition-all shadow-md active:scale-98 tracking-widest text-sm">
                                    LOGIN
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const itemsList = targetType === 'news' ? news : targetType === 'blog' ? blogs : schedules;

            return (
                <div className="max-w-6xl mx-auto px-2 md:px-4 pb-28 relative">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-4 sm:mb-6 gap-2">
                        <PageHeader title="管理画面" bgText="ADMIN" />
                        <button onClick={handleLogout} className="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold text-xs tracking-wider transition-colors flex items-center gap-1.5 border border-red-100">
                            ログアウト
                        </button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl border border-rose-50 overflow-hidden relative mx-1">
                        {isLoading && (
                            <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                <Icons.Spinner size={40} />
                            </div>
                        )}

                        <div className="bg-gray-50 border-b border-gray-100 p-3 md:p-6 flex flex-col md:flex-row justify-between items-center gap-3">
                            <div className="flex bg-gray-200/50 rounded-xl p-1 shadow-inner w-full md:w-auto overflow-x-auto">
                                <button onClick={() => {setTargetType('news'); setActiveTab('add');}} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${targetType === 'news' && activeTab !== 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>お知らせ</button>
                                <button onClick={() => {setTargetType('blog'); setActiveTab('add');}} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${targetType === 'blog' && activeTab !== 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>ブログ</button>
                                <button onClick={() => {setTargetType('schedule'); setActiveTab('add');}} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${targetType === 'schedule' && activeTab !== 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>予定・シフト</button>
                                <button onClick={() => setActiveTab('section')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${activeTab === 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>パート情報</button>
                            </div>
                            {activeTab !== 'section' && (
                                <div className="flex space-x-2 w-full md:w-auto">
                                    <button onClick={() => {setActiveTab('add'); resetForm();}} className={`flex-1 md:flex-none flex justify-center items-center gap-1.5 px-3 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab === 'add' && (!formData.id && !scheduleData.id) ? 'bg-gray-900 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>
                                        <Icons.Plus size={16} /> 新規作成
                                    </button>
                                    <button onClick={() => setActiveTab('edit')} className={`flex-1 md:flex-none flex justify-center items-center gap-1.5 px-3 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab === 'edit' ? 'bg-gray-900 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>
                                        <Icons.Edit size={16} /> 一覧
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-4 md:p-8">
                            {activeTab === 'section' ? (
                                 <div className="space-y-6 animate-fade-in-up">
                                    <h3 className="text-xl font-black text-gray-800 border-b border-gray-100 pb-3">パート情報の編集</h3>
                                    {sectionInfo.map(info => {
                                        const data = sectionData[info.id] || info;
                                        return (
                                            <div key={info.id} className="bg-gray-50 p-4 md:p-6 rounded-2xl border border-gray-200 space-y-3">
                                                <h4 className="font-bold text-sm text-rose-500 mb-2">{info.category}ページ</h4>
                                                <div className="grid md:grid-cols-2 gap-3">
                                                     <div>
                                                         <label className="block text-[10px] font-bold text-gray-500 mb-1">見出し</label>
                                                         <input type="text" value={data.title} onChange={e => setSectionData(prev => ({ ...prev, [info.id]: { ...prev[info.id], title: e.target.value } }))} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none bg-white" />
                                                     </div>
                                                     <div>
                                                         <label className="block text-[10px] font-bold text-gray-500 mb-1">役職・署名</label>
                                                         <input type="text" value={data.author} onChange={e => setSectionData(prev => ({ ...prev, [info.id]: { ...prev[info.id], author: e.target.value } }))} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none bg-white" />
                                                     </div>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1">本文</label>
                                                    <textarea rows={3} value={data.content} onChange={e => setSectionData(prev => ({ ...prev, [info.id]: { ...prev[info.id], content: e.target.value } }))} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none resize-y bg-white"></textarea>
                                                </div>
                                                <div className="text-right">
                                                     <button onClick={() => saveToGAS(sectionData[info.id], 'save', 'section')} className="bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold active:scale-95 transition-all">
                                                         保存する
                                                     </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                 </div>
                            ) : activeTab === 'add' ? (
                                 <div className="relative p-[1px] rounded-2xl bg-gradient-to-br from-rose-300 via-pink-200 to-orange-200 shadow-sm animate-fade-in-up">
                                     <form onSubmit={handleSave} className="space-y-4 md:space-y-6 bg-white/95 backdrop-blur-md p-4 md:p-8 rounded-[15px]">
                                         <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                                             <h3 className="text-lg font-black text-gray-800">
                                                 {(targetType === 'schedule' ? scheduleData.id : formData.id) ? 'データの編集' : '新規データの作成'}
                                                 <span className="text-[10px] font-bold text-rose-500 ml-2 tracking-widest bg-rose-50 px-2.5 py-1 rounded-full whitespace-nowrap inline-block">
                                                     ({targetType === 'news' ? 'お知らせ' : targetType === 'blog' ? 'ブログ' : '予定表'})
                                                 </span>
                                             </h3>
                                             {(targetType === 'schedule' ? scheduleData.id : formData.id) && (
                                                 <button type="button" onClick={resetForm} className="text-xs font-bold text-gray-400 hover:text-gray-900 transition-colors whitespace-nowrap">
                                                     新規作成に戻る
                                                 </button>
                                             )}
                                         </div>

                                        {targetType === 'schedule' ? (
                                            <>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-800">
                                                    <div className="min-w-0">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">日付</label>
                                                        <input type="date" required value={scheduleData.date} onChange={e => setScheduleData({...scheduleData, date: e.target.value})} className="w-full px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:bg-white text-xs font-mono" />
                                                    </div>
                                                    <div className="min-w-0">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">カテゴリー</label>
                                                        <select value={scheduleData.category} onChange={e => setScheduleData({...scheduleData, category: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none">
                                                            <option value="全体">全体</option>
                                                            <option value="応援団">応援団</option>
                                                            <option value="マスゲーム">マスゲーム</option>
                                                            <option value="マスコット">マスコット</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="min-w-0 text-gray-800">
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">予定内容</label>
                                                    <input type="text" required value={scheduleData.plan} onChange={e => setScheduleData({...scheduleData, plan: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="例: グラウンドで通し練習" />
                                                </div>
                                                {scheduleData.category !== '全体' && (
                                                    <div className="min-w-0 text-gray-800">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">シフト担当者（カンマ区切りで一括入力できます）</label>
                                                        <input type="text" value={scheduleData.shifts} onChange={e => setScheduleData({...scheduleData, shifts: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none font-mono" placeholder="例: 3101,3102,2401" />
                                                    </div>
                                                )}
                                            </>
                                        ) : (
                                            <>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-800">
                                                    <div className="min-w-0">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">公開日時</label>
                                                        <div className="flex gap-1.5">
                                                            <input type="datetime-local" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="flex-grow min-w-0 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:bg-white text-xs font-mono" />
                                                            <button 
                                                                type="button" 
                                                                onClick={() => {
                                                                    const now = new Date();
                                                                    const tzoffset = now.getTimezoneOffset() * 60000;
                                                                    const localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);
                                                                    setFormData(prev => ({ ...prev, date: localISOTime }));
                                                                }}
                                                                className="px-3 bg-rose-50 text-rose-600 font-bold rounded-xl text-[10px] border border-rose-100 whitespace-nowrap active:scale-95"
                                                            >
                                                                現在
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <div className="min-w-0">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">ピン止め</label>
                                                        <select value={formData.pin} onChange={e => setFormData({...formData, pin: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none">
                                                            <option value="none">なし</option>
                                                            <option value="home">ホームでピン止め</option>
                                                            <option value="local">各ページでピン止め</option>
                                                        </select>
                                                    </div>
                                                    <div className="min-w-0">
                                                        <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">タグ・見出し (短いラベル)</label>
                                                        <input type="text" value={formData.heading || ''} onChange={e => setFormData({...formData, heading: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="重要、連絡、募集、意気込みなど" />
                                                    </div>
                                                    {targetType === 'news' ? (
                                                        <div className="min-w-0">
                                                            <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">カテゴリー</label>
                                                            <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none">
                                                                <option value="全体">全体</option>
                                                                <option value="応援団">応援団</option>
                                                                <option value="マスゲーム">マスゲーム</option>
                                                                <option value="マスコット">マスコット</option>
                                                            </select>
                                                        </div>
                                                    ) : (
                                                        <div className="min-w-0">
                                                            <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">執筆者</label>
                                                            <input type="text" required value={formData.author || ''} onChange={e => setFormData({...formData, author: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="例: 総長 山田" />
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="min-w-0 text-gray-800">
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">タイトル</label>
                                                    <input type="text" required value={formData.title || ''} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="タイトルを入力" />
                                                </div>
                                                <div className="min-w-0 text-gray-800">
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">本文</label>
                                                    <textarea required value={formData.content || ''} onChange={e => setFormData({...formData, content: e.target.value})} rows={8} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none resize-y" placeholder="本文を入力..."></textarea>
                                                </div>
                                                <div className="min-w-0 text-gray-800">
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">出席番号</label>
                                                    <input type="text" required value={formData.studentId || ''} onChange={e => setFormData({...formData, studentId: e.target.value})} className="w-full md:w-1/3 px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="例: 12" />
                                                </div>
                                            </>
                                        )}
                                         
                                         <div className="pt-4 flex justify-end">
                                             <button type="submit" className="w-full sm:w-auto flex justify-center items-center gap-2 bg-gradient-to-r from-gray-900 to-gray-800 hover:from-rose-500 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-md active:scale-95 transition-all text-sm">
                                                 <Icons.Save size={16} /> 
                                                 <span>{(targetType === 'schedule' ? scheduleData.id : formData.id) ? '更新を保存' : '新しく追加'}</span>
                                             </button>
                                         </div>
                                     </form>
                                 </div>
                            ) : (
                                <div className="overflow-x-auto -mx-4 px-4 scrollbar-thin">
                                    <table className="w-full text-left border-collapse min-w-[700px]">
                                        <thead>
                                            <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-600">
                                                <th className="p-3 text-[10px] font-bold uppercase">Date</th>
                                                {targetType !== 'schedule' && <th className="p-3 text-[10px] font-bold uppercase">Status</th>}
                                                {targetType !== 'schedule' && <th className="p-3 text-[10px] font-bold uppercase">Pin</th>}
                                                <th className="p-3 text-[10px] font-bold uppercase">{targetType === 'schedule' ? 'Plan' : 'Title'}</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">{targetType === 'blog' ? 'Author' : 'Category'}</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">{targetType === 'schedule' ? 'Shifts' : 'Tag'}</th>
                                                <th className="p-3 text-[10px] font-bold uppercase text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-gray-700">
                                            {itemsList.sort((a,b) => {
                                                const dateA = targetType === 'schedule' ? new Date(a.date) : new Date(a.date.replace(' ', 'T'));
                                                const dateB = targetType === 'schedule' ? new Date(b.date) : new Date(b.date.replace(' ', 'T'));
                                                return targetType === 'schedule' ? dateA - dateB : dateB - dateA;
                                            }).map(item => {
                                                const isFuture = targetType !== 'schedule' && new Date(item.date.replace(' ', 'T')) > new Date();
                                                return (
                                                    <tr key={item.id} className="border-b border-gray-100 hover:bg-rose-50/20 transition-colors">
                                                        <td className="p-3 text-xs font-mono text-gray-500">{item.date}</td>
                                                        {targetType !== 'schedule' && (
                                                            <td className="p-3">
                                                                {isFuture ? (
                                                                    <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-50 text-amber-600 rounded-full text-[9px] font-bold border border-amber-200">
                                                                        <Icons.Clock size={10} /> 予約中
                                                                    </span>
                                                                ) : (
                                                                    <span className="px-2 py-0.5 bg-green-50 text-green-600 rounded-full text-[9px] font-bold border border-green-200">
                                                                        公開中
                                                                    </span>
                                                                )}
                                                            </td>
                                                        )}
                                                        {targetType !== 'schedule' && (
                                                            <td className="p-3">
                                                                {item.pin !== 'none' && <Icons.Pin size={14} className={item.pin === 'home' ? 'text-rose-500 fill-rose-500' : 'text-gray-300'} />}
                                                            </td>
                                                        )}
                                                        <td className="p-3 font-bold text-xs md:text-sm text-gray-800 max-w-[200px] truncate">{targetType === 'schedule' ? item.plan : item.title}</td>
                                                        <td className="p-3 text-xs">
                                                            <span className="bg-white border border-gray-200 px-2 py-0.5 rounded text-[10px]">{targetType === 'blog' ? item.author : item.category}</span>
                                                        </td>
                                                        <td className="p-3 text-[10px]">
                                                            {targetType === 'schedule' ? (
                                                                <span className="font-mono text-gray-500 max-w-[150px] truncate block">{item.shifts || '-'}</span>
                                                            ) : item.heading ? (
                                                                <span className="px-1.5 py-0.5 bg-gray-100 text-gray-600 border border-gray-200 rounded">{item.heading}</span>
                                                            ) : <span className="text-gray-300">-</span>}
                                                        </td>
                                                        <td className="p-3 text-right space-x-1.5 whitespace-nowrap">
                                                            <button onClick={() => handleEdit(item)} className="p-1.5 bg-white border text-gray-600 rounded-lg active:scale-95 hover:bg-gray-900 hover:text-white transition-all"><Icons.Edit size={14}/></button>
                                                            <button 
                                                                onClick={() => handleDeleteClick(item.id)} 
                                                                className={`p-1.5 rounded-lg active:scale-95 transition-all ${confirmDeleteId === item.id ? 'bg-red-500 text-white' : 'bg-white border text-red-500 hover:bg-red-50'}`}
                                                            >
                                                                <Icons.Trash2 size={14}/>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {itemsList.length === 0 && (
                                                <tr><td colSpan="7" className="p-8 text-center text-gray-400 font-bold text-xs">データがありません</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const [newsList, setNewsList] = useState([]);
            const [blogList, setBlogList] = useState([]);
            const [schedules, setSchedules] = useState(DEFAULT_SCHEDULES);
            const [sectionInfo, setSectionInfo] = useState(DEFAULT_SECTION_INFO);
            const [isFetching, setIsFetching] = useState(true);
            const [isBackgroundFetching, setIsBackgroundFetching] = useState(false);
            const [toast, setToast] = useState(null);
            const [fetchError, setFetchError] = useState(null);

            const handleTriggerToast = (message, type) => { setToast({ message, type }); };

            const handleUpdateSchedule = (updatedSchedule) => {
                setSchedules(prev => {
                    const newSchedules = prev.map(s => s.id === updatedSchedule.id ? updatedSchedule : s);
                    // キャッシュ更新
                    const cachedDataStr = localStorage.getItem('edan_cached_data');
                    if (cachedDataStr) {
                        try {
                            const cached = JSON.parse(cachedDataStr);
                            cached.schedules = newSchedules;
                            localStorage.setItem('edan_cached_data', JSON.stringify(cached));
                        } catch (e) {}
                    }
                    return newSchedules;
                });
            };

            useEffect(() => {
                const loadData = async () => {
                    // キャッシュを読み込む
                    const cachedDataStr = localStorage.getItem('edan_cached_data');
                    if (cachedDataStr) {
                        try {
                            const cached = JSON.parse(cachedDataStr);
                            if (cached.news) setNewsList(cached.news);
                            if (cached.blogs) setBlogList(cached.blogs);
                            if (cached.sectionInfo && cached.sectionInfo.length > 0) setSectionInfo(cached.sectionInfo);
                            if (cached.schedules && cached.schedules.length > 0) setSchedules(cached.schedules);
                            setIsFetching(false);
                            setIsBackgroundFetching(true);
                        } catch (e) {
                            console.warn('Cache parse error', e);
                        }
                    }

                    // 最新データを取得
                    try {
                        const response = await fetch(GAS_URL, { redirect: 'follow' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const textData = await response.text();
                        if (textData.trim().startsWith('<')) throw new Error('GAS Authorization required');
                        
                        let data = JSON.parse(textData);
                        
                        const newNews = Array.isArray(data.news) ? data.news : [];
                        const newBlogs = Array.isArray(data.blogs) ? data.blogs : [];
                        const newSectionInfo = Array.isArray(data.sectionInfo) && data.sectionInfo.length > 0 ? data.sectionInfo : DEFAULT_SECTION_INFO;
                        const newSchedules = Array.isArray(data.schedules) ? data.schedules : DEFAULT_SCHEDULES;

                        setNewsList(newNews);
                        setBlogList(newBlogs);
                        setSectionInfo(newSectionInfo);
                        setSchedules(newSchedules);
                        setFetchError(null);

                        // キャッシュ更新
                        localStorage.setItem('edan_cached_data', JSON.stringify({
                            news: newNews, blogs: newBlogs, sectionInfo: newSectionInfo, schedules: newSchedules
                        }));

                    } catch (error) {
                        console.warn("データ取得エラー（キャッシュがあればそれを利用）:", error);
                        if (!cachedDataStr) {
                            setFetchError(error.message);
                        }
                    } finally {
                        setIsFetching(false);
                        setIsBackgroundFetching(false);
                    }
                };

                loadData();

                const handleScroll = () => { setIsScrolled(window.scrollY > 20); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigateTo = (page) => {
                setCurrentPage(page);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const menuItems = [
                { id: 'home', label: 'ホーム' },
                { id: 'news', label: 'お知らせ' },
                { id: 'blog', label: 'ブログ' },
                { id: 'schedule', label: '予定表' },
                { id: 'ouen', label: '応援団' },
                { id: 'mass', label: 'マスゲーム' },
                { id: 'mascot', label: 'マスコット' },
                { id: 'admin', label: '管理者用' },
            ];

            return (
                <div className="min-h-screen bg-[#FFF5F8] selection:bg-rose-200 selection:text-rose-900 text-gray-800 overflow-x-hidden flex flex-col pb-safe">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    {isBackgroundFetching && (
                        <div className="fixed top-16 md:top-6 right-4 md:right-8 z-40 bg-white/90 backdrop-blur rounded-full p-2 shadow border border-rose-100 flex items-center justify-center pointer-events-none">
                            <Icons.Spinner size={16} />
                        </div>
                    )}

                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 pt-safe ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-2' : 'bg-transparent py-4'}`}>
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex items-center justify-between">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-1.5 group">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-pink-600 flex items-center justify-center text-white font-bold transition-transform group-hover:rotate-12">🌸</div>
                                <span className="text-lg md:text-xl font-black tracking-tighter text-gray-900">桃色E団</span>
                            </button>
                            
                            <div className="hidden lg:flex space-x-1 bg-white/50 backdrop-blur-md p-1 rounded-full border border-rose-100/60 shadow-sm mr-8">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => navigateTo(item.id)}
                                        className={`px-5 py-2 rounded-full text-xs font-bold tracking-widest transition-all duration-300 ${
                                            currentPage === item.id ? 'bg-rose-500 text-white shadow-md' : 'text-gray-500 hover:text-gray-900 hover:bg-gray-100/50'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            <button className="lg:hidden p-2 text-gray-900 bg-white rounded-full shadow-sm border border-rose-100 active:scale-95" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <Icons.X size={20} /> : <Icons.Menu size={20} />}
                            </button>
                        </div>
                    </nav>

                    <div className={`fixed inset-0 bg-white z-40 lg:hidden transition-transform duration-300 ease-in-out pt-safe-top ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex flex-col h-full pt-20 px-8 space-y-4 overflow-y-auto pb-12">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => navigateTo(item.id)} className={`text-2xl font-black tracking-tighter text-left py-2 border-b border-gray-50 transition-colors ${currentPage === item.id ? 'text-rose-500' : 'text-gray-300 hover:text-gray-900'}`}>
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-grow pt-safe-top">
                        {fetchError && !localStorage.getItem('edan_cached_data') ? (
                            <div className="flex flex-col items-center justify-center h-[70vh] gap-4 px-4">
                                <Icons.AlertCircle size={48} className="text-rose-400" />
                                <p className="text-gray-600 font-bold text-center">データの取得に失敗しました。<br/>電波の良いところで再度お試しください。</p>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-gray-900 text-white rounded-full font-bold text-xs">再読み込み</button>
                            </div>
                        ) : (
                            <>
                                {currentPage === 'home' && <HomePage navigateTo={navigateTo} news={newsList} blogs={blogList} schedules={schedules} isFetching={isFetching} onUpdateSchedule={handleUpdateSchedule} onTriggerToast={handleTriggerToast} />}
                                {currentPage === 'news' && <NewsPage news={newsList} isFetching={isFetching} />}
                                {currentPage === 'blog' && <BlogPage blogs={blogList} isFetching={isFetching} />}
                                {currentPage === 'schedule' && <SchedulePage schedules={schedules} isFetching={isFetching} onUpdateSchedule={handleUpdateSchedule} onTriggerToast={handleTriggerToast} />}
                                
                                {currentPage === 'ouen' && (
                                    <SectionPage 
                                        title="応援団" bgText="CHEER" news={newsList} schedules={schedules} category="応援団" themeColor="red" isFetching={isFetching} onUpdateSchedule={handleUpdateSchedule} onTriggerToast={handleTriggerToast}
                                        renderExtra={() => {
                                            const info = sectionInfo.find(i => i.id === 'ouen-info') || DEFAULT_SECTION_INFO[0];
                                            return (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up">
                                                     <div className="bg-gradient-to-br from-gray-900 to-gray-800 text-white rounded-3xl p-6 md:p-10 shadow-md relative overflow-hidden">
                                                         <div className="relative z-10 flex flex-col h-full">
                                                             <h3 className="text-lg md:text-xl font-black mb-4 tracking-tight text-red-400 border-b border-gray-700 pb-2">{info.title}</h3>
                                                             <p className="text-gray-300 leading-relaxed italic text-sm md:text-base whitespace-pre-wrap flex-grow">{info.content}</p>
                                                             <p className="mt-4 font-bold text-xs tracking-widest text-gray-400 text-right">{info.author}</p>
                                                         </div>
                                                     </div>
                                                     <div className="bg-white rounded-3xl p-6 md:p-10 border border-rose-100 shadow-md hover:-translate-y-1 transition-transform duration-300 relative overflow-hidden group">
                                                         <div className="absolute top-0 right-0 w-24 h-24 bg-red-50 rounded-bl-full -z-10 group-hover:scale-150 transition-transform duration-500"></div>
                                                         <div className="w-12 h-12 bg-gradient-to-br from-red-500 to-rose-600 text-white rounded-xl flex items-center justify-center mb-4 shadow-md rotate-3">
                                                             <Icons.Download size={20} />
                                                         </div>
                                                         <h3 className="text-xl font-black text-gray-800 mb-2 tracking-tight">音源・資料DL</h3>
                                                         <p className="text-gray-500 mb-6 leading-relaxed text-xs md:text-sm">練習用の音源ファイルや応援歌の資料はGoogleドライブにまとめています。各自ダウンロードして自主練習に励みましょう。</p>
                                                         <a href="https://drive.google.com/drive/folders/1mFqQ75NwW8WaRQFDME5aYI35WVJBRuhV?usp=sharing" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-red-600 font-bold hover:text-red-700 text-sm active:scale-95">
                                                             Google Driveを開く <Icons.ExternalLink size={16} />
                                                         </a>
                                                     </div>
                                                </div>
                                            );
                                        }}
                                    />
                                )}

                                {currentPage === 'mass' && (
                                    <SectionPage 
                                        title="マスゲーム" bgText="DANCE" news={newsList} schedules={schedules} category="マスゲーム" themeColor="pink" isFetching={isFetching} onUpdateSchedule={handleUpdateSchedule} onTriggerToast={handleTriggerToast}
                                        renderExtra={() => {
                                             const info = sectionInfo.find(i => i.id === 'mass-info') || DEFAULT_SECTION_INFO[1];
                                             return (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up">
                                                     <div className="bg-gradient-to-br from-pink-100 to-pink-50 rounded-3xl p-6 md:p-10 border border-pink-200 shadow-md relative overflow-hidden">
                                                         <div className="relative z-10 flex flex-col h-full">
                                                             <h3 className="text-lg md:text-xl font-black mb-4 tracking-tight text-pink-600 border-b border-pink-200 pb-2">{info.title}</h3>
                                                             <p className="text-gray-700 leading-relaxed mb-4 text-sm md:text-base whitespace-pre-wrap flex-grow">{info.content}</p>
                                                             <div className="bg-white/60 backdrop-blur-sm px-3 py-2 rounded-lg border border-pink-100 text-xs font-bold text-pink-800 inline-block self-end">{info.author}</div>
                                                         </div>
                                                     </div>
                                                     <div className="bg-white rounded-3xl p-6 md:p-10 border border-rose-100 shadow-md hover:-translate-y-1 transition-transform duration-300 relative overflow-hidden group">
                                                         <div className="absolute top-0 right-0 w-24 h-24 bg-pink-50 rounded-bl-full -z-10 group-hover:scale-150 transition-transform duration-500"></div>
                                                         <div className="w-12 h-12 bg-gradient-to-br from-pink-500 to-fuchsia-600 text-white rounded-xl flex items-center justify-center mb-4 shadow-md -rotate-3">
                                                             <Icons.Download size={20} />
                                                         </div>
                                                         <h3 className="text-xl font-black text-gray-800 mb-2 tracking-tight">練習動画・音源DL</h3>
                                                         <p className="text-gray-500 mb-6 leading-relaxed text-xs md:text-sm">パートごとの振り付け動画や、フォーメーション図はこちらから確認できます。</p>
                                                         <button onClick={() => handleTriggerToast('マスゲーム音源フォルダは現在準備中です。', 'success')} className="inline-flex items-center gap-1.5 text-pink-600 font-bold hover:text-pink-700 text-sm active:scale-95">
                                                             ファイルにアクセス <Icons.ExternalLink size={16} />
                                                         </button>
                                                     </div>
                                                </div>
                                             );
                                        }}
