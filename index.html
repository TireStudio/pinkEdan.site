<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover を追加して、iPhoneのノッチ（画面上部の凹凸）部分まで背景色を広げます -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>桃色E団 Webサイト</title>
    
    <!-- ==========================================
      PWA (Progressive Web App) 用メタタグ＆マニフェスト
    ========================================== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFF5F8">
    
    <!-- iOS用の設定 (PWA起動、ステータスバー、アプリアイコン) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="桃色E団">
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/192/000000/cherry-blossom.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (In-browser JSX Compiler for Zero-Config Deployment) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- ==========================================
      OneSignal SDKの読み込みと初期化 (ご指定のドメイン制限付き初期化)
    ========================================== -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        const host = window.location.hostname;
        // 許可された本番ドメイン、またはローカル開発環境のみ初期化を実行してプレビューエラーを防止
        if (host === 'tirestudio.github.io' || host === 'localhost' || host === '127.0.0.1') {
          await OneSignal.init({
            appId: "f4e581d1-c4e6-4ceb-a841-555ee90724fc",
          });
        } else {
          console.warn("OneSignal initialization skipped on unallowed domain (Preview/Sandbox mode):", host);
        }
      });
    </script>
</head>
<!-- overflow-x-hidden でスマートフォンでの不自然な横揺れ・横スクロールを完全に防止します -->
<body class="bg-[#FFF5F8] text-gray-800 overflow-x-hidden select-none">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 動作確認済みの最新GAS WebアプリURL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycby3Z9Ws1OPhCbFe-CO0Sa8VXBh30iv8tKqKd_yJ9gBzVo9F-VGrp7PPC1xQlhSfImmJHQ/exec';

        // デフォルトのパート情報（GAS疎通前の表示、またはフォールバック用）
        const DEFAULT_SECTION_INFO = [
            { id: 'ouen-info', category: '応援団', title: '応援団長より', content: '「圧倒的な声量と一糸乱れぬ動きで、桃色E団を勝利に導こう！」', author: '団長: 田中 一郎' },
            { id: 'mass-info', category: 'マスゲーム', title: '💃 振り付け・構成', content: '「桜花烂漫」をテーマに、美しさと力強さを表現しましょう！', author: '次回の全体合わせ: 中庭にて' },
            { id: 'mascot-info', category: 'マスコット', title: '🎨 制作進行状況', content: '現在、外枠の木枠制作に入っています。色塗りの手伝いを募集します！', author: '制作場所: 美術室前' }
        ];

        // 役職情報の静的データ
        const POSITIONS = [
            { role: '副長', name: '鈴木 花子', desc: '総長を全力でサポートし、団の雰囲気を明るく盛り上げます！', icon: '⭐' },
            { role: '応援団長', name: '田中 一郎', desc: '圧倒的な声量とパッションで、勝利へ導く応援を作ります！', icon: '🔥' },
            { role: 'マスゲーム長', name: '伊藤 美咲', desc: '美しく、そして心に残るマスゲームをみんなで完成させましょう！', icon: '💃' },
            { role: 'マスコット長', name: '渡辺 健太', desc: '誰からも愛される最高のマスコットを作り上げます！', icon: '🎨' },
            { role: '会計', name: '中村 結衣', desc: '団のお金をしっかり管理し、スムーズな活動を支えます。', icon: '💰' },
            { role: '書記', name: '小林 翔太', desc: '議事録やスケジュール管理など、裏から団を支えます。', icon: '📝' },
        ];

        const Icons = {
            Menu: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
            ),
            X: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
            ),
            Pin: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.12-2.65A2 2 0 0 1 16 10.11V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v5.11a2 2 0 0 1-.44 1.24L5.44 14a2 2 0 0 0-.44 1.24Z"></path></svg>
            ),
            Download: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            ),
            ChevronDown: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>
            ),
            ChevronRight: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>
            ),
            Lock: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            ),
            Edit: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
            ),
            Plus: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
            ),
            Trash2: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            ),
            Box: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            ),
            ExternalLink: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            ),
            ImageIcon: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            ),
            RefreshCw: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            ),
            Save: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            ),
            CheckCircle: ({ size = 24, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            ),
            AlertCircle: ({ size = 24, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            ),
            Clock: ({ size = 12, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            ),
            Bell: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
            )
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-6 right-6 left-6 md:left-auto z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl border animate-fade-in-up md:max-w-md ${
                    type === 'success' ? 'bg-white border-green-100 text-green-700' : 'bg-white border-red-100 text-red-700'
                }`}>
                    {type === 'success' ? <Icons.CheckCircle className="text-green-500" size={24} /> : <Icons.AlertCircle className="text-red-500" size={24} />}
                    <span className="font-bold text-sm flex-1">{message}</span>
                    <button onClick={onClose} className="ml-2 text-gray-400 hover:text-gray-600"><Icons.X size={16}/></button>
                </div>
            );
        };

        const PageHeader = ({ title, bgText }) => (
            <div className="relative pt-24 pb-12 overflow-hidden mb-8 flex justify-center items-center">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[5rem] md:text-[10rem] font-black text-rose-100/30 opacity-40 whitespace-nowrap select-none pointer-events-none z-0 tracking-tighter uppercase font-mono">
                    {bgText || title}
                </div>
                <div className="relative z-10 text-center px-4">
                    <h1 className="text-4xl md:text-6xl font-black text-gray-800 tracking-tight drop-shadow-sm">{title}</h1>
                    <div className="w-16 h-1.5 bg-gradient-to-r from-rose-400 to-pink-500 mx-auto mt-4 rounded-full"></div>
                </div>
            </div>
        );

        const AccordionItem = ({ title, subtitle, content, pinType, category, onCategoryClick, heading }) => {
            const [isOpen, setIsOpen] = useState(false);
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                return dateStr.replace('T', ' ').substring(0, 16);
            };
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-rose-50 overflow-hidden transition-all duration-300 hover:shadow-md mb-4 group relative">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-rose-300 to-pink-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <div className="w-full px-4 md:px-8 py-4 flex items-center justify-between text-left">
                        <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 flex-grow pr-3 min-w-0">
                            <div className="flex items-center gap-1.5 md:gap-3 shrink-0 flex-wrap">
                                {pinType === 'home' && <Icons.Pin size={16} className="text-rose-500 fill-rose-500 drop-shadow-sm shrink-0" />}
                                {pinType === 'local' && <Icons.Pin size={16} className="text-rose-300 shrink-0" />}
                                {category && (
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            if (onCategoryClick) onCategoryClick(category);
                                        }} 
                                        className="text-[10px] md:text-xs font-black tracking-wider px-2 py-0.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-full whitespace-nowrap transition-colors"
                                    >
                                        {category}
                                    </button>
                                )}
                                {heading && (
                                    <span className="text-[10px] md:text-xs font-bold tracking-wider px-2 py-0.5 bg-gray-100 text-gray-600 border border-gray-200/60 rounded-md whitespace-nowrap">
                                        {heading}
                                    </span>
                                )}
                                <span className="text-xs font-medium text-gray-400 font-mono">{formatDisplayDate(subtitle)}</span>
                            </div>
                            <button onClick={() => setIsOpen(!isOpen)} className="text-left font-bold text-gray-800 text-base md:text-lg leading-snug group-hover:text-rose-600 transition-colors focus:outline-none truncate w-full">
                                {title}
                            </button>
                        </div>
                        <button onClick={() => setIsOpen(!isOpen)} className={`transform transition-transform duration-300 bg-rose-50 p-2 rounded-full shrink-0 ${isOpen ? 'rotate-180 bg-rose-100 text-rose-600' : 'text-rose-400'}`}>
                            <Icons.ChevronDown size={16} />
                        </button>
                    </div>
                    <div className={`transition-all duration-300 ease-in-out px-4 md:px-8 text-gray-600 whitespace-pre-wrap text-sm md:text-base leading-relaxed ${isOpen ? 'py-5 border-t border-rose-100/50 max-h-[1000px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        {content}
                    </div>
                </div>
            );
        };

        // React用のOneSignalプッシュ購読ボタン
        const PushSubscriptionButton = () => {
            const [isSubscribed, setIsSubscribed] = useState(false);
            const [isSupported, setIsSupported] = useState(true);
            const [isPending, setIsPending] = useState(false);

            useEffect(() => {
                window.OneSignalDeferred = window.OneSignalDeferred || [];
                window.OneSignalDeferred.push((OneSignal) => {
                    // プッシュ通知がサポートされているか確認
                    setIsSupported(OneSignal.Notifications.isPushSupported());
                    
                    // 初期状態の取得
                    setIsSubscribed(OneSignal.User.PushSubscription.optedIn);

                    // 購読ステータスの変化を監視するイベントリスナー
                    const handleSubscriptionChange = (event) => {
                        setIsSubscribed(event.current.optedIn);
                        setIsPending(false);
                    };

                    OneSignal.User.PushSubscription.addEventListener("change", handleSubscriptionChange);

                    return () => {
                        OneSignal.User.PushSubscription.removeEventListener("change", handleSubscriptionChange);
                    };
                });
            }, []);

            const handleToggleSubscription = () => {
                setIsPending(true);
                window.OneSignalDeferred = window.OneSignalDeferred || [];
                window.OneSignalDeferred.push(async (OneSignal) => {
                    try {
                        if (OneSignal.User.PushSubscription.optedIn) {
                            // 購読中の場合はオプトアウト（配信停止）
                            await OneSignal.User.PushSubscription.optOut();
                        } else {
                            // 未購読の場合はオプトイン（通知を許可するダイアログを表示）
                            await OneSignal.User.PushSubscription.optIn();
                        }
                    } catch (error) {
                        console.error("購読の切り替えに失敗しました:", error);
                        setIsPending(false);
                    }
                });
            };

            if (!isSupported) {
                return null; // 非サポート端末では表示しない
            }

            return (
                <button
                    onClick={handleToggleSubscription}
                    disabled={isPending}
                    className={`w-full sm:w-auto flex items-center justify-center gap-2 px-8 py-3.5 rounded-full font-bold text-sm tracking-wider transition-all duration-300 shadow-xl hover:-translate-y-1 active:scale-95 ${
                        isSubscribed
                            ? 'bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 shadow-rose-100/30'
                            : 'bg-rose-500 text-white hover:bg-rose-600 shadow-rose-500/30'
                    } ${isPending ? 'opacity-70 cursor-not-allowed' : ''}`}
                >
                    <Icons.Bell size={18} className={isSubscribed ? "fill-rose-600" : ""} />
                    <span>
                        {isPending 
                            ? '処理中...' 
                            : isSubscribed 
                                ? '通知をオフにする' 
                                : '通知を受け取る'}
                    </span>
                </button>
            );
        };

        const HomePage = ({ navigateTo, news, blogs, newsError, blogError, isFetching }) => {
            const [shuffledPositions, setShuffledPositions] = useState([]);
            useEffect(() => {
                const shuffleArray = (array) => {
                    const newArray = [...array];
                    for (let i = newArray.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                    }
                    return newArray;
                };
                setShuffledPositions(shuffleArray(POSITIONS));
            }, []);

            const visibleNews = useMemo(() => {
                const now = new Date();
                return news.filter(n => new Date(n.date.replace(' ', 'T')) <= now);
            }, [news]);

            const visibleBlogs = useMemo(() => {
                const now = new Date();
                return blogs.filter(b => new Date(b.date.replace(' ', 'T')) <= now);
            }, [blogs]);

            const recentNews = useMemo(() => {
                const getLatest = (cat, count) => visibleNews.filter(n => n.category === cat).slice(0, count);
                const general = getLatest('全体', 2);
                const ouen = getLatest('応援団', 1);
                const mass = getLatest('マスゲーム', 1);
                const mascot = getLatest('マスコット', 1);
                return [...general, ...ouen, ...mass, ...mascot].sort((a, b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T')));
            }, [visibleNews]);

            const recentBlogs = useMemo(() => {
                return visibleBlogs.sort((a, b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T'))).slice(0, 3);
            }, [visibleBlogs]);

            return (
                <div className="space-y-16 md:space-y-24 pb-16 overflow-x-hidden">
                    {/* もにゅもにゅアニメーション付きヒーローセクション */}
                    <section className="relative h-[85vh] flex items-center justify-center overflow-hidden bg-gradient-to-br from-rose-200 via-pink-100 to-orange-100 pb-12" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 90%, 0 100%)' }}>

                setIsLoading(true);
                const type = typeOverride || targetType;
                const isEditing = data.id !== null && data.id !== undefined && String(data.id).trim() !== '';

                try {
                    if (data.date) data.date = data.date.replace('T', ' ');
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, type, data }),
                    });
                    if (!response.ok) throw new Error(`GASエラー: ${response.status}`);
                    const resText = await response.text();
                    let resJson;
                    try { resJson = JSON.parse(resText); } catch (e) { throw new Error('レスポンスのパースに失敗しました。'); }

                    if (resJson && resJson.status === 'success') {
                        if (action === 'save') {
                            if (type === 'news') {
                                if (isEditing) setNews(news.map(n => String(n.id) === String(resJson.data.id) ? resJson.data : n));
                                else setNews([resJson.data, ...news]);
                            } else if (type === 'blog') {
                                if (isEditing) setBlogs(blogs.map(b => String(b.id) === String(resJson.data.id) ? resJson.data : b));
                                else setBlogs([resJson.data, ...blogs]);
                            } else if (type === 'section') {
                                setSectionInfo(sectionInfo.map(info => String(info.id) === String(resJson.data.id) ? resJson.data : info));
                            }
                            onTriggerToast('スプレッドシートと同期しました！', 'success');
                            if (type !== 'section') resetForm();
                        } else if (action === 'delete') {
                            if (type === 'news') setNews(news.filter(n => String(n.id) !== String(data.id)));
                            else if (type === 'blog') setBlogs(blogs.filter(b => String(b.id) !== String(data.id)));
                            onTriggerToast('削除を完了し、スプレッドシートに同期しました。', 'success');
                            setConfirmDeleteId(null);
                        }
                    } else {
                        throw new Error(resJson.message || '不明なサーバーエラー。');
                    }
                } catch (error) {
                    onTriggerToast(`同期エラー: ${error.message}`, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                const isEditing = formData.id !== null && formData.id !== undefined && String(formData.id).trim() !== '';
                saveToGAS({ ...formData, id: isEditing ? formData.id : null }, 'save');
            };

            const handleEdit = (item) => {
                let formattedDate = item.date;
                if (formattedDate) {
                    const d = new Date(formattedDate.replace(' ', 'T'));
                    if (!isNaN(d.getTime())) {
                        const tzoffset = d.getTimezoneOffset() * 60000;
                        formattedDate = (new Date(d.getTime() - tzoffset)).toISOString().slice(0, 16);
                    }
                }
                setFormData({ ...item, date: formattedDate });
                setActiveTab('add');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDeleteClick = (id) => {
                if (confirmDeleteId === id) {
                    saveToGAS({ id }, 'delete');
                } else {
                    setConfirmDeleteId(id);
                    setTimeout(() => { setConfirmDeleteId(prev => prev === id ? null : prev); }, 3000);
                }
            };

            const handleSectionInfoChange = (id, field, value) => {
                setSectionData(prev => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-[80vh] flex items-center justify-center px-4 relative">
                        <div className="bg-white p-6 md:p-14 rounded-3xl shadow-xl w-full max-w-sm border border-rose-50 relative z-10 animate-fade-in-up">
                            <div className="w-16 h-16 bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <Icons.Lock className="text-white" size={24} />
                            </div>
                            <h2 className="text-2xl font-black text-gray-800 mb-1 text-center tracking-tight">管理者ログイン</h2>
                            <p className="text-gray-400 mb-8 text-xs text-center font-bold tracking-widest">ADMIN DASHBOARD</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    value={password} 
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white transition-all text-center tracking-widest font-bold text-gray-800"
                                    placeholder="PASSWORD"
                                />
                                <button type="submit" className="w-full py-3 bg-gray-900 hover:bg-rose-500 text-white font-bold rounded-xl transition-all shadow-md active:scale-98 tracking-widest text-sm">
                                    LOGIN
                                </button>
                            </form>
                            <p className="text-[10px] text-center text-gray-400 mt-4">パスワード: momoiro</p>
                        </div>
                    </div>
                );
            }

            const itemsList = targetType === 'news' ? news : blogs;

            return (
                <div className="max-w-6xl mx-auto px-2 md:px-4 pb-16 relative">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-4 sm:mb-6 gap-2">
                        <PageHeader title="管理画面" bgText="ADMIN" />
                        <button onClick={handleLogout} className="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold text-xs tracking-wider transition-colors flex items-center gap-1.5 border border-red-100">
                            ログアウト
                        </button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl border border-rose-50 overflow-hidden relative mx-1">
                        {isLoading && (
                            <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                <div className="animate-spin rounded-full h-10 w-10 border-4 border-rose-200 border-t-rose-500"></div>
                            </div>
                        )}

                        <div className="bg-gray-50 border-b border-gray-100 p-3 md:p-6 flex flex-col md:flex-row justify-between items-center gap-3">
                            <div className="flex bg-gray-200/50 rounded-xl p-1 shadow-inner w-full md:w-auto overflow-x-auto">
                                <button onClick={() => {setTargetType('news'); setActiveTab('add');}} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${targetType === 'news' && activeTab !== 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>お知らせ</button>
                                <button onClick={() => {setTargetType('blog'); setActiveTab('add');}} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${targetType === 'blog' && activeTab !== 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>ブログ</button>
                                <button onClick={() => setActiveTab('section')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-lg font-bold text-xs transition-all whitespace-nowrap ${activeTab === 'section' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}`}>パート情報</button>
                            </div>
                            {activeTab !== 'section' && (
                                <div className="flex space-x-2 w-full md:w-auto">
                                    <button onClick={() => {setActiveTab('add'); resetForm();}} className={`flex-1 md:flex-none flex justify-center items-center gap-1.5 px-3 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab === 'add' && !formData.id ? 'bg-gray-900 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>
                                        <Icons.Plus size={16} /> 新規作成
                                    </button>
                                    <button onClick={() => setActiveTab('edit')} className={`flex-1 md:flex-none flex justify-center items-center gap-1.5 px-3 py-2.5 rounded-xl font-bold text-xs transition-all ${activeTab === 'edit' ? 'bg-gray-900 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>
                                        <Icons.Edit size={16} /> 一覧
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-4 md:p-8">
                            {activeTab === 'section' ? (
                                 <div className="space-y-6 animate-fade-in-up">
                                    <h3 className="text-xl font-black text-gray-800 border-b border-gray-100 pb-3">パート情報の編集</h3>
                                    {sectionInfo.map(info => {
                                        const data = sectionData[info.id] || info;
                                        return (
                                            <div key={info.id} className="bg-gray-50 p-4 md:p-6 rounded-2xl border border-gray-200 space-y-3">
                                                <h4 className="font-bold text-sm text-rose-500 mb-2">{info.category}ページ</h4>
                                                <div className="grid md:grid-cols-2 gap-3">
                                                     <div>
                                                         <label className="block text-[10px] font-bold text-gray-500 mb-1">見出し</label>
                                                         <input type="text" value={data.title} onChange={e => handleSectionInfoChange(info.id, 'title', e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none text-gray-800 bg-white" />
                                                     </div>
                                                     <div>
                                                         <label className="block text-[10px] font-bold text-gray-500 mb-1">役職・署名</label>
                                                         <input type="text" value={data.author} onChange={e => handleSectionInfoChange(info.id, 'author', e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none text-gray-800 bg-white" />
                                                     </div>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-gray-500 mb-1">本文</label>
                                                    <textarea rows={3} value={data.content} onChange={e => handleSectionInfoChange(info.id, 'content', e.target.value)} className="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none resize-y text-gray-800 bg-white"></textarea>
                                                </div>
                                                <div className="text-right">
                                                     <button onClick={() => saveToGAS(sectionData[info.id], 'save', 'section')} className="bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold active:scale-95 transition-all">
                                                         保存する
                                                     </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                 </div>
                            ) : activeTab === 'add' ? (
                                 <div className="relative p-[1px] rounded-2xl bg-gradient-to-br from-rose-300 via-pink-200 to-orange-200 shadow-sm animate-fade-in-up">
                                     <form onSubmit={handleSave} className="space-y-4 md:space-y-6 bg-white/95 backdrop-blur-md p-4 md:p-8 rounded-[15px]">
                                         <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                                             <h3 className="text-lg font-black text-gray-800">
                                                 {formData.id ? '記事の編集' : '新規記事の作成'}
                                                 <span className="text-[10px] font-bold text-rose-500 ml-2 tracking-widest bg-rose-50 px-2.5 py-1 rounded-full whitespace-nowrap inline-block">
                                                     ({targetType === 'news' ? 'お知らせ' : 'ブログ'})
                                                 </span>
                                             </h3>
                                             {formData.id && (
                                                 <button type="button" onClick={resetForm} className="text-xs font-bold text-gray-400 hover:text-gray-900 transition-colors whitespace-nowrap">
                                                     新規作成に戻る
                                                 </button>
                                             )}
                                         </div>

                                         <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-800">
                                             <div className="min-w-0">
                                                 <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">公開日時</label>
                                                 <div className="flex gap-1.5">
                                                     <input type="datetime-local" required value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="flex-grow min-w-0 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 focus:outline-none focus:bg-white text-xs font-mono" />
                                                     <button 
                                                         type="button" 
                                                         onClick={() => {
                                                             const now = new Date();
                                                             const tzoffset = now.getTimezoneOffset() * 60000;
                                                             const localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);
                                                             setFormData(prev => ({ ...prev, date: localISOTime }));
                                                         }}
                                                         className="px-3 bg-rose-50 text-rose-600 font-bold rounded-xl text-[10px] border border-rose-100 whitespace-nowrap active:scale-95"
                                                     >
                                                         現在
                                                     </button>
                                                 </div>
                                             </div>
                                             <div className="min-w-0">
                                                 <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">ピン止め</label>
                                                 <select value={formData.pin} onChange={e => setFormData({...formData, pin: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none">
                                                     <option value="none">なし</option>
                                                     <option value="home">ホームでピン止め</option>
                                                     <option value="local">各ページでピン止め</option>
                                                 </select>
                                             </div>
                                             <div className="min-w-0">
                                                 <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">タグ・見出し (短いラベル)</label>
                                                 <input type="text" value={formData.heading || ''} onChange={e => setFormData({...formData, heading: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="重要、連絡、募集、意気込みなど" />
                                             </div>
                                             {targetType === 'news' ? (
                                                 <div className="min-w-0">
                                                     <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">カテゴリー</label>
                                                     <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none">
                                                         <option value="全体">全体</option>
                                                         <option value="応援団">応援団</option>
                                                         <option value="マスゲーム">マスゲーム</option>
                                                         <option value="マスコット">マスコット</option>
                                                     </select>
                                                 </div>
                                             ) : (
                                                 <div className="min-w-0">
                                                     <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">執筆者</label>
                                                     <input type="text" required value={formData.author || ''} onChange={e => setFormData({...formData, author: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="例: 総長 山田" />
                                                 </div>
                                             )}
                                         </div>

                                         <div className="min-w-0 text-gray-800">
                                             <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">タイトル</label>
                                             <input type="text" required value={formData.title || ''} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="タイトルを入力" />
                                         </div>
                                         <div className="min-w-0 text-gray-800">
                                             <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">本文</label>
                                             <textarea required value={formData.content || ''} onChange={e => setFormData({...formData, content: e.target.value})} rows={8} className="w-full px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none resize-y" placeholder="本文を入力..."></textarea>
                                         </div>
                                         <div className="min-w-0 text-gray-800">
                                             <label className="block text-[10px] font-bold text-gray-500 mb-1.5 uppercase">出席番号</label>
                                             <input type="text" required value={formData.studentId || ''} onChange={e => setFormData({...formData, studentId: e.target.value})} className="w-full md:w-1/3 px-3 py-2 text-xs rounded-xl bg-gray-50 border border-gray-200 focus:outline-none" placeholder="例: 12" />
                                         </div>
                                         
                                         <div className="pt-4 flex justify-end">
                                             <button type="submit" className="w-full sm:w-auto flex justify-center items-center gap-2 bg-gradient-to-r from-gray-900 to-gray-800 hover:from-rose-500 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-md active:scale-95 transition-all text-sm">
                                                 <Icons.Save size={16} /> 
                                                 <span>{formData.id ? '更新を保存' : '新しく追加'}</span>
                                             </button>
                                         </div>
                                     </form>
                                 </div>
                            ) : (
                                <div className="overflow-x-auto -mx-4 px-4 scrollbar-thin">
                                    <table className="w-full text-left border-collapse min-w-[700px]">
                                        <thead>
                                            <tr className="bg-gray-50 border-b-2 border-gray-200 text-gray-600">
                                                <th className="p-3 text-[10px] font-bold uppercase">Date</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">Status</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">Pin</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">Title</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">{targetType === 'news' ? 'Category' : 'Author'}</th>
                                                <th className="p-3 text-[10px] font-bold uppercase">Tag</th>
                                                <th className="p-3 text-[10px] font-bold uppercase text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-gray-700">
                                            {itemsList.sort((a,b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T'))).map(item => {
                                                const isFuture = new Date(item.date.replace(' ', 'T')) > new Date();
                                                return (
                                                    <tr key={item.id} className="border-b border-gray-100 hover:bg-rose-50/20 transition-colors">
                                                        <td className="p-3 text-xs font-mono text-gray-500">{item.date}</td>
                                                        <td className="p-3">
                                                            {isFuture ? (
                                                                <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-50 text-amber-600 rounded-full text-[9px] font-bold border border-amber-200">
                                                                    <Icons.Clock size={10} /> 予約中
                                                                </span>
                                                            ) : (
                                                                <span className="px-2 py-0.5 bg-green-50 text-green-600 rounded-full text-[9px] font-bold border border-green-200">
                                                                    公開中
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-3">
                                                            {item.pin !== 'none' && <Icons.Pin size={14} className={item.pin === 'home' ? 'text-rose-500 fill-rose-500' : 'text-gray-300'} />}
                                                        </td>
                                                        <td className="p-3 font-bold text-xs md:text-sm text-gray-800 max-w-[200px] truncate">{item.title}</td>
                                                        <td className="p-3 text-xs">
                                                            <span className="bg-white border border-gray-200 px-2 py-0.5 rounded text-[10px]">{targetType === 'news' ? item.category : item.author}</span>
                                                        </td>
                                                        <td className="p-3 text-[10px]">
                                                            {item.heading ? (
                                                                <span className="px-1.5 py-0.5 bg-gray-100 text-gray-600 border border-gray-200 rounded">{item.heading}</span>
                                                            ) : <span className="text-gray-300">-</span>}
                                                        </td>
                                                        <td className="p-3 text-right space-x-1.5 whitespace-nowrap">
                                                            <button onClick={() => handleEdit(item)} className="p-1.5 bg-white border text-gray-600 rounded-lg active:scale-95 hover:bg-gray-900 hover:text-white transition-all"><Icons.Edit size={14}/></button>
                                                            <button 
                                                                onClick={() => handleDeleteClick(item.id)} 
                                                                className={`p-1.5 rounded-lg active:scale-95 transition-all ${confirmDeleteId === item.id ? 'bg-red-500 text-white' : 'bg-white border text-red-500 hover:bg-red-50'}`}
                                                            >
                                                                <Icons.Trash2 size={14}/>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {itemsList.length === 0 && (
                                                <tr><td colSpan="7" className="p-8 text-center text-gray-400 font-bold text-xs">データがありません</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const [newsList, setNewsList] = useState([]);
            const [blogList, setBlogList] = useState([]);
            const [sectionInfo, setSectionInfo] = useState(DEFAULT_SECTION_INFO);
            const [isFetching, setIsFetching] = useState(true);
            const [toast, setToast] = useState(null);

            const [newsError, setNewsError] = useState(null);
            const [blogError, setBlogError] = useState(null);

            const handleTriggerToast = (message, type) => { setToast({ message, type }); };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setIsFetching(true);
                        setNewsError(null);
                        setBlogError(null);
                        const response = await fetch(GAS_URL, { redirect: 'follow' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const textData = await response.text();
                        if (textData.trim().startsWith('<')) throw new Error('Authorization required');
                        
                        let data = JSON.parse(textData);
                        setNewsList(Array.isArray(data.news) ? data.news : []);
                        setBlogList(Array.isArray(data.blogs) ? data.blogs : []);
                        setSectionInfo(Array.isArray(data.sectionInfo) && data.sectionInfo.length > 0 ? data.sectionInfo : DEFAULT_SECTION_INFO);
                    } catch (error) {
                        console.warn("GAS load failed", error);
                        setNewsError(error.message);
                        setBlogError(error.message);
                        setSectionInfo(DEFAULT_SECTION_INFO);
                    } finally {
                        setIsFetching(false);
                    }
                };
                fetchData();

                const handleScroll = () => { setIsScrolled(window.scrollY > 20); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigateTo = (page) => {
                setCurrentPage(page);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const menuItems = [
                { id: 'home', label: 'ホーム' },
                { id: 'news', label: 'お知らせ' },
                { id: 'blog', label: 'ブログ' },
                { id: 'ouen', label: '応援団' },
                { id: 'mass', label: 'マスゲーム' },
                { id: 'mascot', label: 'マスコット' },
                { id: 'admin', label: '管理者用' },
            ];

            return (
                <div className="min-h-screen bg-[#FFF5F8] selection:bg-rose-200 selection:text-rose-900 text-gray-800 overflow-x-hidden flex flex-col pb-safe">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    {/* セーフエリア保護を追加 */}
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 pt-safe ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-2' : 'bg-transparent py-4'}`}>
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex items-center justify-between">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-1.5 group">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-pink-600 flex items-center justify-center text-white font-bold transition-transform group-hover:rotate-12">🌸</div>
                                <span className="text-lg md:text-xl font-black tracking-tighter text-gray-900">桃色E団</span>
                            </button>
                            
                            <div className="hidden lg:flex space-x-1 bg-white/50 backdrop-blur-md p-1 rounded-full border border-rose-100/60 shadow-sm">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}

    <!-- CUSTOM STYLES (Animations & iOS PWA Safe Area Helper) -->
    <style>
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
            opacity: 0;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes monyu {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }
        .animate-monyu {
            animation: blob 8s infinite, monyu 6s ease-in-out infinite alternate;
        }
        @keyframes monyu-grad {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-monyu-grad {
            animation: monyu-grad 10s ease-in-out infinite;
            background-size: 200% 200%;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* iOS 11以降のセーフエリア（ノッチ・下部バー）対策 */
        .pt-safe {
            padding-top: max(1rem, env(safe-area-inset-top));
        }
        .pt-safe-top {
            padding-top: max(4.5rem, calc(4.5rem + env(safe-area-inset-top)));
        }
        .pb-safe {
            padding-bottom: max(0px, env(safe-area-inset-bottom));
        }
        .pb-safe-bottom {
            padding-bottom: max(1rem, calc(1rem + env(safe-area-inset-bottom)));
        }
    </style>
