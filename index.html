<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>桃色E団 Webサイト</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (In-browser JSX Compiler for Zero-Config Deployment) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- OneSignal SDK for Web Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "f4e581d1-c4e6-4ceb-a841-555ee90724fc",
                allowLocalhostAsSecureOrigin: true,
                notifyButton: { enable: false } // 標準の赤いベルボタンはサイトデザインに合わないため非表示
            });
        });
    </script>
</head>
<body class="bg-[#FAFAFA] text-gray-800 antialiased overflow-x-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // GASのWebアプリURL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzC7YdwKI16or9Vyka9oXBSMpq5w1MsR-T5kVs_kFrT78f-Ze9n0aLRcn7CzgEtEFBrmw/exec';

        // デフォルトのパート情報（GAS疎通前の表示用）
        const DEFAULT_SECTION_INFO = [
            { id: 'ouen-info', category: '応援団', title: '応援団長より', content: '「圧倒的な声量と一糸乱れぬ動きで、桃色E団を勝利に導こう！」', author: '団長: 田中 一郎' },
            { id: 'mass-info', category: 'マスゲーム', title: '💃 振り付け・構成', content: '「桜花烂漫」をテーマに、美しさと力強さを表現しましょう！', author: '次回の全体合わせ: 中庭にて' },
            { id: 'mascot-info', category: 'マスコット', title: '🎨 制作進行状況', content: '現在、外枠 of 木枠制作に入っています。色塗りの手伝いを募集します！', author: '制作場所: 美術室前' }
        ];

        // 役職情報の静的データ
        const POSITIONS = [
            { role: '副長', name: '鈴木 花子', desc: '総長を全力でサポートし、団の雰囲気を明るく盛り上げます！', icon: '⭐' },
            { role: '応援団長', name: '田中 一郎', desc: '圧倒的な声量とパッションで、勝利へ導く応援を作ります！', icon: '🔥' },
            { role: 'マスゲーム長', name: '伊藤 美咲', desc: '美しく、そして心に残るマスゲームをみんなで完成させましょう！', icon: '💃' },
            { role: 'マスコット長', name: '渡辺 健太', desc: '誰からも愛される最高のマスコットを作り上げます！', icon: '🎨' },
            { role: '会計', name: '中村 結衣', desc: '団のお金をしっかり管理し、スムーズな活動を支えます。', icon: '💰' },
            { role: '書記', name: '小林 翔太', desc: '議事録やスケジュール管理など、裏から団を支えます。', icon: '📝' },
        ];

        const Icons = {
            Menu: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
            ),
            X: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
            ),
            Pin: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.12-2.65A2 2 0 0 1 16 10.11V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v5.11a2 2 0 0 1-.44 1.24L5.44 14a2 2 0 0 0-.44 1.24Z"></path></svg>
            ),
            Download: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            ),
            ChevronDown: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>
            ),
            ChevronRight: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>
            ),
            Lock: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            ),
            Edit: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
            ),
            Plus: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
            ),
            Trash2: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            ),
            Box: ({ size = 16, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            ),
            ExternalLink: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            ),
            ImageIcon: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            ),
            RefreshCw: ({ size = 18, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            ),
            Save: ({ size = 20, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            ),
            CheckCircle: ({ size = 24, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            ),
            AlertCircle: ({ size = 24, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            ),
            Clock: ({ size = 12, className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            )
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-4 right-4 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl border animate-fade-in-up ${
                    type === 'success' ? 'bg-white border-green-100 text-green-700' : 'bg-white border-red-100 text-red-700'
                }`}>
                    {type === 'success' ? <Icons.CheckCircle className="text-green-500" size={24} /> : <Icons.AlertCircle className="text-red-500" size={24} />}
                    <span className="font-bold">{message}</span>
                    <button onClick={onClose} className="ml-2 text-gray-400 hover:text-gray-600"><Icons.X size={16}/></button>
                </div>
            );
        };

        const PageHeader = ({ title, bgText }) => (
            <div className="relative pt-24 pb-16 overflow-hidden mb-12 flex justify-center items-center">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[8rem] md:text-[12rem] font-black text-rose-50 opacity-50 whitespace-nowrap select-none pointer-events-none z-0 tracking-tighter">
                    {bgText || title}
                </div>
                <div className="relative z-10 text-center px-4">
                    <h1 className="text-5xl md:text-6xl font-black text-gray-800 tracking-tight drop-shadow-sm">{title}</h1>
                    <div className="w-24 h-1.5 bg-gradient-to-r from-rose-400 to-pink-500 mx-auto mt-6 rounded-full"></div>
                </div>
            </div>
        );

        const AccordionItem = ({ title, subtitle, content, pinType, category, onCategoryClick, heading }) => {
            const [isOpen, setIsOpen] = useState(false);
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                return dateStr.replace('T', ' ').substring(0, 16);
            };
            return (
                <div className="bg-white rounded-3xl shadow-sm border border-rose-50 overflow-hidden transition-all duration-500 hover:shadow-lg mb-6 group relative">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-rose-300 to-pink-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <div className="w-full px-6 md:px-8 py-5 flex items-center justify-between text-left">
                        <div className="flex flex-col md:flex-row md:items-center gap-3 md:gap-6 flex-grow pr-4">
                            <div className="flex items-center gap-2 md:gap-3 shrink-0 flex-wrap">
                                {pinType === 'home' && <Icons.Pin size={18} className="text-rose-500 fill-rose-500 drop-shadow-sm shrink-0" />}
                                {pinType === 'local' && <Icons.Pin size={18} className="text-rose-300 shrink-0" />}
                                {category && (
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            if (onCategoryClick) onCategoryClick(category);
                                        }} 
                                        className="text-xs font-black tracking-wider px-2.5 py-1 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-full whitespace-nowrap transition-colors"
                                    >
                                        {category}
                                    </button>
                                )}
                                {heading && (
                                    <span className="text-xs font-bold tracking-wider px-2 py-0.5 bg-gray-100 text-gray-600 border border-gray-200/60 rounded-md whitespace-nowrap">
                                        {heading}
                                    </span>
                                )}
                                <span className="text-sm font-medium text-gray-400 font-mono">{formatDisplayDate(subtitle)}</span>
                            </div>
                            <button onClick={() => setIsOpen(!isOpen)} className="text-left font-bold text-gray-800 text-lg leading-snug group-hover:text-rose-600 transition-colors focus:outline-none">
                                {title}
                            </button>
                        </div>
                        <button onClick={() => setIsOpen(!isOpen)} className={`transform transition-transform duration-500 bg-rose-50 p-2 rounded-full shrink-0 ${isOpen ? 'rotate-180 bg-rose-100 text-rose-600' : 'text-rose-400'}`}>
                            <Icons.ChevronDown size={20} />
                        </button>
                    </div>
                    <div className={`transition-all duration-500 ease-in-out px-6 md:px-8 text-gray-600 whitespace-pre-wrap text-base leading-relaxed ${isOpen ? 'py-6 border-t border-rose-100/50 max-h-[1000px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        {content}
                    </div>
                </div>
            );
        };

        const HomePage = ({ navigateTo, news, blogs, newsError, blogError, isFetching, isSubscribed, notificationLoading, notificationError, handleToggleNotification }) => {
            const [shuffledPositions, setShuffledPositions] = useState([]);
            useEffect(() => {
                const shuffleArray = (array) => {
                    const newArray = [...array];
                    for (let i = newArray.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                    }
                    return newArray;
                };
                setShuffledPositions(shuffleArray(POSITIONS));
            }, []);

            const visibleNews = useMemo(() => {
                const now = new Date();
                return news.filter(n => new Date(n.date.replace(' ', 'T')) <= now);
            }, [news]);

            const visibleBlogs = useMemo(() => {
                const now = new Date();
                return blogs.filter(b => new Date(b.date.replace(' ', 'T')) <= now);
            }, [blogs]);

            const recentNews = useMemo(() => {
                const getLatest = (cat, count) => visibleNews.filter(n => n.category === cat).slice(0, count);
                const general = getLatest('全体', 2);
                const ouen = getLatest('応援団', 1);
                const mass = getLatest('マスゲーム', 1);
                const mascot = getLatest('マスコット', 1);
                return [...general, ...ouen, ...mass, ...mascot].sort((a, b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T')));
            }, [visibleNews]);

            const recentBlogs = useMemo(() => {
                return visibleBlogs.sort((a, b) => new Date(b.date.replace(' ', 'T')) - new Date(a.date.replace(' ', 'T'))).slice(0, 3);
            }, [visibleBlogs]);

            return (
                <div className="space-y-24 pb-24">
                    <section className="relative h-[80vh] flex items-center justify-center overflow-hidden bg-gradient-to-br from-rose-100 via-pink-50 to-rose-200" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 85%, 0 100%)' }}>
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-rose-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-monyu"></div>
                        <div className="absolute top-1/3 right-1/4 w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-monyu animation-delay-2000"></div>
                        <div className="absolute -bottom-8 left-1/2 w-96 h-96 bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-monyu animation-delay-4000"></div>

                        <div className="relative z-10 text-center px-4 max-w-4xl mx-auto">
                            <p className="text-rose-600 font-bold tracking-[0.3em] mb-4 text-sm md:text-base animate-fade-in-up">TEAM PINK 2026</p>
                            <h1 className="text-7xl md:text-9xl font-black text-gray-900 tracking-tighter mb-8 drop-shadow-sm animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                                桃色<span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-600">E</span>団
                            </h1>
                            <p className="text-gray-700 text-lg md:text-2xl font-medium leading-relaxed mb-10 animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                                情熱と誇りを胸に。<br/>最高の体育祭を、ここから創り出す。
                            </p>
                            <button onClick={() => navigateTo('news')} className="bg-gray-900 text-white px-10 py-4 rounded-full font-bold tracking-wider hover:bg-rose-500 transition-all duration-300 shadow-xl hover:shadow-rose-500/30 hover:-translate-y-1 animate-fade-in-up" style={{ animationDelay: '0.3s' }}>
                                最新情報を見る
                            </button>
                        </div>
                    </section>

                    <div className="max-w-5xl mx-auto px-4 space-y-32">
                        <section className="relative">
                            <div className="absolute -left-8 top-0 text-8xl font-black text-gray-50 opacity-50 select-none pointer-events-none -z-10">NEWS</div>
                            <div className="flex items-end justify-between mb-12 border-b-2 border-gray-100 pb-4">
                                <div>
                                    <h2 className="text-4xl font-black text-gray-800 tracking-tight">お知らせ</h2>
                                    <p className="text-rose-400 text-sm tracking-[0.2em] mt-2 font-bold">LATEST INFORMATION</p>
                                </div>
                                <button onClick={() => navigateTo('news')} className="text-gray-500 hover:text-rose-600 flex items-center text-sm font-bold transition-colors group">
                                    すべて見る <Icons.ChevronRight size={18} className="transform group-hover:translate-x-1 transition-transform" />
                                </button>
                            </div>
                            {isFetching ? (
                                <div className="flex justify-center py-16">
                                    <div className="animate-spin rounded-full h-10 w-10 border-4 border-rose-200 border-t-rose-500"></div>
                                </div>
                            ) : newsError ? (
                                <div className="bg-red-50 border border-red-100 rounded-3xl p-6 text-center text-red-700 font-bold flex items-center justify-center gap-3 shadow-inner">
                                    <Icons.AlertCircle size={20} />
                                    <span>お知らせが取得できませんでした。スプレッドシートの接続を確認してください。</span>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {recentNews.map(item => (
                                        <AccordionItem 
                                            key={item.id} 
                                            title={item.title} 
                                            subtitle={item.date} 
                                            content={item.content} 
                                            pinType={item.pin === 'home' ? 'home' : 'none'} 
                                            category={item.category}
                                            heading={item.heading}
                                            onCategoryClick={() => navigateTo('news')}
                                        />
                                    ))}
                                    {recentNews.length === 0 && (
                                        <p className="text-center py-10 text-gray-400 font-bold">公開中のお知らせはありません</p>
                                    )}
                                </div>
                            )}
                        </section>

                        <section className="relative">
                            <div className="absolute -right-8 top-0 text-8xl font-black text-gray-50 opacity-50 select-none pointer-events-none -z-10">BLOG</div>
                            <div className="flex items-end justify-between mb-12 border-b-2 border-gray-100 pb-4">
                                <div>
                                    <h2 className="text-4xl font-black text-gray-800 tracking-tight">ブログ</h2>
                                    <p className="text-rose-400 text-sm tracking-[0.2em] mt-2 font-bold">TEAM DIARY</p>
                                </div>
                                <button onClick={() => navigateTo('blog')} className="text-gray-500 hover:text-rose-600 flex items-center text-sm font-bold transition-colors group">
                                    すべて読む <Icons.ChevronRight size={18} className="transform group-hover:translate-x-1 transition-transform" />
                                </button>
                            </div>
                            {isFetching ? (
                                <div className="flex justify-center py-16">
                                    <div className="animate-spin rounded-full h-10 w-10 border-4 border-rose-200 border-t-rose-500"></div>
                                </div>
                            ) : blogError ? (
                                <div className="bg-red-50 border border-red-100 rounded-3xl p-6 text-center text-red-700 font-bold flex items-center justify-center gap-3 shadow-inner">
                                    <Icons.AlertCircle size={20} />
                                    <span>最新のブログが取得できませんでした。スプレッドシートの接続を確認してください。</span>
                                </div>
                            ) : (
                                <div className="grid md:grid-cols-3 gap-8">

        const AdminPage = ({ news, setNews, blogs, setBlogs, sectionInfo, setSectionInfo, onTriggerToast }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {

            });
            const [password, setPassword] = useState('');
            const [activeTab, setActiveTab] = useState('add');
            const [targetType, setTargetType] = useState('news');
            const [isLoading, setIsLoading] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [formData, setFormData] = useState({ id: null, pin: 'none', heading: '', date: '', category: '全体', author: '', title: '', content: '', studentId: '' });
            const [sectionData, setSectionData] = useState({});

            useEffect(() => {
                const infoMap = {};
                sectionInfo.forEach(info => { infoMap[info.id] = { ...info }; });
                setSectionData(infoMap);
            }, [sectionInfo]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'momoiro') {
                    setIsAuthenticated(true);
                    localStorage.setItem('admin_authenticated', 'true');
                    onTriggerToast('ログインに成功しました。', 'success');
                } else {
                    onTriggerToast('パスワードが間違っています。', 'error');
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                localStorage.removeItem('admin_authenticated');
                onTriggerToast('ログアウトしました。', 'success');
            };

            const resetForm = () => {
                const now = new Date();
                const tzoffset = now.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);
                setFormData({ id: null, pin: 'none', heading: '', date: localISOTime, category: '全体', author: '', title: '', content: '', studentId: '' });
            };

            useEffect(() => { setConfirmDeleteId(null); }, [activeTab, targetType]);

            const saveToGAS = async (data, action, typeOverride) => {
                setIsLoading(true);
                const type = typeOverride || targetType;
                const isEditing = data.id !== null && data.id !== undefined && String(data.id).trim() !== '';

                try {
                    if (data.date) data.date = data.date.replace('T', ' ');
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, type, data }),
                    });
                    if (!response.ok) throw new Error(`GASエラー: ${response.status}`);
                    const resText = await response.text();
                    let resJson;
                    try { resJson = JSON.parse(resText); } catch (e) { throw new Error('レスポンスのパースに失敗しました。'); }

                    if (resJson && resJson.status === 'success') {
                        if (action === 'save') {
                            if (type === 'news') {
                                if (isEditing) setNews(news.map(n => String(n.id) === String(resJson.data.id) ? resJson.data : n));
                                else setNews([resJson.data, ...news]);
                            } else if (type === 'blog') {
                                if (isEditing) setBlogs(blogs.map(b => String(b.id) === String(resJson.data.id) ? resJson.data : b));
                                else setBlogs([resJson.data, ...blogs]);
                            } else if (type === 'section') {
                                setSectionInfo(sectionInfo.map(info => String(info.id) === String(resJson.data.id) ? resJson.data : info));
                            }
                            onTriggerToast('スプレッドシートと同期しました！', 'success');
                            if (type !== 'section') resetForm();
                        } else if (action === 'delete') {
                            if (type === 'news') setNews(news.filter(n => String(n.id) !== String(data.id)));
                            else if (type === 'blog') setBlogs(blogs.filter(b => String(b.id) !== String(data.id)));
                            onTriggerToast('削除を完了し、スプレッドシートに同期しました。', 'success');
                            setConfirmDeleteId(null);
                        }
                    } else {
                        throw new Error(resJson.message || '不明なサーバーエラー。');
                    }
                } catch (error) {
                    onTriggerToast(`同期エラー: ${error.message}`, 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                const isEditing = formData.id !== null && formData.id !== undefined && String(formData.id).trim() !== '';
                saveToGAS({ ...formData, id: isEditing ? formData.id : null }, 'save');
            };

            const handleEdit = (item) => {
                let formattedDate = item.date;
                if (formattedDate) {
                    const d = new Date(formattedDate.replace(' ', 'T'));
                    if (!isNaN(d.getTime())) {
                        const tzoffset = d.getTimezoneOffset() * 60000;
                        formattedDate = (new Date(d.getTime() - tzoffset)).toISOString().slice(0, 16);
                    }
                }
                setFormData({ ...item, date: formattedDate });
                setActiveTab('add');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDeleteClick = (id) => {
                if (confirmDeleteId === id) {
                    saveToGAS({ id }, 'delete');

                                                                onClick={() => handleDeleteClick(item.id)} 
                                                                className={`p-2 rounded-lg transition-all ${confirmDeleteId === item.id ? 'bg-red-500 text-white' : 'bg-white border text-red-500 hover:bg-red-50'}`}

        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const [newsList, setNewsList] = useState([]);
            const [blogList, setBlogList] = useState([]);
            const [sectionInfo, setSectionInfo] = useState(DEFAULT_SECTION_INFO);
            const [isFetching, setIsFetching] = useState(true);
            const [toast, setToast] = useState(null);

            const [newsError, setNewsError] = useState(null);
            const [blogError, setBlogError] = useState(null);

            // 🔔 プッシュ通知管理用のステート
            const [isSubscribed, setIsSubscribed] = useState(false);
            const [notificationLoading, setNotificationLoading] = useState(true);
            const [notificationError, setNotificationError] = useState("");

            useEffect(() => {
                window.OneSignalDeferred = window.OneSignalDeferred || [];
                if (!document.getElementById('onesignal-sdk')) {
                    const script = document.createElement('script');
                    script.id = 'onesignal-sdk';
                    script.src = 'https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js';
                    script.defer = true;
                    document.head.appendChild(script);
                }

                window.OneSignalDeferred.push(async function(OneSignal) {
                    try {
                        await OneSignal.init({
                            appId: "f4e581d1-c4e6-4ceb-a841-555ee90724fc",
                            allowLocalhostAsSecureOrigin: true,
                            notifyButton: { enable: false }
                        });
                        console.log("OneSignal initialized");

                        // 読み込み完了後に現在の購読ステータスをチェック
                        const permission = OneSignal.Notifications.permission;
                        const isOptedIn = OneSignal.User.PushSubscription.optedIn;
                        if (permission && isOptedIn) {
                            setIsSubscribed(true);
                        }
                    } catch (error) {
                        console.warn("OneSignal initialization skipped:", error);
                    } finally {
                        setNotificationLoading(false);
                    }
                });
            }, []);

            // 🔔 プッシュ通知登録・解除切り替えのトリガー関数
            const handleToggleNotification = async () => {
                if (!window.OneSignalDeferred) {
                    alert("通知機能が現在準備できていません。通信環境をご確認ください。");
                    return;
                }

                setNotificationLoading(true);
                setNotificationError("");

                window.OneSignalDeferred.push(async function(OneSignal) {
                    try {
                        const permission = OneSignal.Notifications.permission;

                        if (!permission) {
                            // ユーザーのタップを起点にして通知許可ポップアップを起動
                            await OneSignal.Notifications.requestPermission();
                            if (OneSignal.Notifications.permission) {
                                setIsSubscribed(true);
                            } else {
                                setNotificationError("通知許可が拒否されました。iPhoneの「設定」->「通知」より許可を有効にしてください。");
                            }
                        } else {
                            // 既に一度ダイアログが完了している場合は、OneSignal内部のオプトイン・アウトを制御
                            if (isSubscribed) {
                                await OneSignal.User.PushSubscription.optOut();
                                setIsSubscribed(false);
                            } else {
                                await OneSignal.User.PushSubscription.optIn();
                                setIsSubscribed(true);
                            }
                        }
                    } catch (e) {
                        console.error("通知設定変更エラー:", e);
                        setNotificationError("設定の変更に失敗しました。");
                    } finally {
                        setNotificationLoading(false);
                    }
                });
            };

            const handleTriggerToast = (message, type) => { setToast({ message, type }); };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setIsFetching(true);
                        setNewsError(null);
                        setBlogError(null);
                        const response = await fetch(GAS_URL, { redirect: 'follow' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const textData = await response.text();
                        if (textData.trim().startsWith('<')) throw new Error('Authorization required');
                        
                        let data = JSON.parse(textData);
                        setNewsList(Array.isArray(data.news) ? data.news : []);
                        setBlogList(Array.isArray(data.blogs) ? data.blogs : []);
                        setSectionInfo(Array.isArray(data.sectionInfo) && data.sectionInfo.length > 0 ? data.sectionInfo : DEFAULT_SECTION_INFO);
                    } catch (error) {
                        console.warn("GAS load failed", error);
                        setNewsError(error.message);
                        setBlogError(error.message);
                        setSectionInfo(DEFAULT_SECTION_INFO);
                    } finally {
                        setIsFetching(false);
                    }
                };
                fetchData();

                const handleScroll = () => { setIsScrolled(window.scrollY > 20); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigateTo = (page) => {
                setCurrentPage(page);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const menuItems = [
                { id: 'home', label: 'ホーム' },
                { id: 'news', label: 'お知らせ' },
                { id: 'blog', label: 'ブログ' },
                { id: 'ouen', label: '応援団' },
                { id: 'mass', label: 'マスゲーム' },
                { id: 'mascot', label: 'マスコット' },
                { id: 'admin', label: '管理者用' },
            ];

            return (
                <div className="min-h-screen bg-[#FAFAFA] selection:bg-rose-200 selection:text-rose-900 text-gray-800">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-2' : 'bg-transparent py-4'}`}>
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex items-center justify-between">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-2 group">
                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-pink-600 flex items-center justify-center text-white font-bold transition-transform group-hover:rotate-12">🌸</div>
                                <span className="text-xl font-black tracking-tighter text-gray-900">桃色E団</span>
                            </button>
                            
                            <div className="hidden lg:flex space-x-1 bg-white/50 backdrop-blur-md p-1 rounded-full border border-gray-100 shadow-sm">
                                {menuItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => navigateTo(item.id)}
                                        className={`px-5 py-2 rounded-full text-xs font-bold tracking-widest transition-all duration-300 ${
                                            currentPage === item.id ? 'bg-rose-500 text-white shadow-md' : 'text-gray-500 hover:text-gray-900 hover:bg-gray-100/50'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                    <div className={`fixed inset-0 bg-white z-40 lg:hidden transition-transform duration-500 ease-in-out ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>

                            {menuItems.map(item => (

                            ))}
                        </div>
                    </div>

                    <main className="min-h-screen">
                        {currentPage === 'home' && (
                            <HomePage 
                                navigateTo={navigateTo} 
                                news={newsList} 
                                blogs={blogList} 
                                newsError={newsError} 
                                blogError={blogError} 
                                isFetching={isFetching}
                                isSubscribed={isSubscribed}
                                notificationLoading={notificationLoading}
                                notificationError={notificationError}
                                handleToggleNotification={handleToggleNotification}
                            />

                                    const info = sectionInfo.find(i => i.id === 'ouen-info') || DEFAULT_SECTION_INFO[0];
                                    return (
                                        <div className="grid md:grid-cols-2 gap-8 animate-fade-in-up">

                                        <div className="space-y-12 animate-fade-in-up">
                                             <div className="grid md:grid-cols-2 gap-8">

                                                     <div className="w-16 h-16 bg-gradient-to-br from-orange-500 to-amber-600 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg rotate-3">

                                                     <p className="text-orange-400 font-bold tracking-widest text-sm mt-2">PREVIEW</p>
                                                 </div>
                                                 <div className="w-full aspect-square md:aspect-[21/9] bg-gradient-to-br from-gray-900 to-gray-800 rounded-[2rem] shadow-inner flex flex-col items-center justify-center relative overflow-hidden group">
                                                     <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 mix-blend-overlay"></div>
                                                     <div className="w-32 h-32 relative mb-12 animate-spin-slow" style={{ transformStyle: 'preserve-3d' }}>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'translateZ(64px)' }}></div>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'rotateY(180deg) translateZ(64px)' }}></div>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'rotateY(90deg) translateZ(64px)' }}></div>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'rotateY(-90deg) translateZ(64px)' }}></div>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'rotateX(90deg) translateZ(64px)' }}></div>
                                                         <div className="absolute inset-0 border-2 border-orange-500/50 bg-gradient-to-br from-orange-400/20 to-orange-600/20 backdrop-blur-md shadow-[0_0_30px_rgba(249,115,22,0.3)]" style={{ transform: 'rotateX(-90deg) translateZ(64px)' }}></div>
                                                     </div>
                                                     <div className="relative z-10 px-6 py-2 border border-white/20 bg-white/10 backdrop-blur-md rounded-full shadow-lg">
                                                         <p className="font-bold text-orange-300 tracking-[0.2em] flex items-center gap-2 text-sm">
                                                             <Icons.Box size={16} /> MODEL PREVIEW COMING SOON
                                                         </p>
                                                     </div>
                                                 </div>
                                                 <div className="flex flex-wrap justify-center gap-4">
                                                     <button className="px-8 py-3 bg-white border rounded-xl text-sm font-bold text-gray-600 hover:border-orange-500 hover:bg-orange-50 flex items-center gap-2 shadow-sm"><Icons.RefreshCw size={18} /> リセット</button>
                                                     <button className="px-8 py-3 bg-white border rounded-xl text-sm font-bold text-gray-600 hover:border-orange-500 hover:bg-orange-50 flex items-center gap-2 shadow-sm"><Icons.ImageIcon size={18} /> 外殻非表示</button>
                                                 </div>
                                             </div>
                                        </div>
                                    );
                                }}
                            />
                        )}

                        {currentPage === 'admin' && (
                            <AdminPage 
                                news={newsList} 
                                setNews={setNewsList} 
                                blogs={blogList} 
                                setBlogs={setBlogList} 
                                sectionInfo={sectionInfo} 
                                setSectionInfo={setSectionInfo} 
                                onTriggerToast={handleTriggerToast}
                            />
                        )}
                    </main>
                    
                    <footer className="bg-gray-900 py-16 text-center mt-20 rounded-t-[3rem] relative overflow-hidden">
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10 mix-blend-overlay"></div>
                        <div className="relative z-10">
                            <h2 className="text-2xl font-black text-white tracking-tighter mb-2">桃色E団</h2>
                            <p className="text-gray-500 text-sm tracking-widest font-bold mb-8">2026 SPORTS FESTIVAL</p>
                            <div className="w-12 h-1 bg-gray-800 mx-auto mb-8 rounded-full"></div>
                            <p className="text-sm text-gray-600 font-mono">&copy; 2026 桃色E団 All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

    <!-- CUSTOM STYLES (Animations) -->
    <style>
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            animation: gradient-xy 15s ease infinite;
            background-size: 400% 400%;
        }
        @keyframes monyu {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }
        .animate-monyu {
            animation: blob 10s infinite, monyu 8s ease-in-out infinite alternate;
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
