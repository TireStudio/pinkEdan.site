<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>桃色E団 Webサイト</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFF5F8">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="桃色E団">
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/192/000000/cherry-blossom.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                        'bounce-subtle': 'bounceSubtle 2s infinite',
                    },
                    keyframes: {
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-2px)' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FFF5F8] text-gray-800 overflow-x-hidden select-none">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 【重要】新しくデプロイしたGASのWebアプリURL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx2IJriak9pBJYMN2ffAXoDTi_EgOS12Pa--TtUTOlYtVA7jse7N8mP6x3mXDuLpaEkzQ/exec';

        // デフォルト情報（GAS読み込み前やエラー時の仮データ）
        const DEFAULT_SECTION_INFO = [
            { id: 'ouen-info', category: '応援団', title: '応援団長より', content: '「圧倒的な声量と一糸乱れぬ動きで、桃色E団を勝利に導こう！」', author: '応援団長' },
            { id: 'mass-info', category: 'マスゲーム', title: '💃 振り付け・構成', content: '「桜花烂漫」をテーマに、美しさと力強さを表現しましょう！', author: 'マスゲーム長' },
            { id: 'mascot-info', category: 'マスコット', title: '🎨 制作進行状況', content: '現在、外枠の木枠制作に入っています。色塗りの手伝いを募集します！', author: 'マスコット長' }
        ];

        // デフォルト予定データ
        const DEFAULT_SCHEDULES = [
            { id: 's1', date: '2026-09-01', category: '全体', plan: '開会式リハーサル (全体集合)', shifts: '' },
            { id: 's2', date: '2026-09-01', category: '応援団', plan: 'グラウンド通し練', shifts: '3101,3102,2105,1203' },
            { id: 's3', date: '2026-09-02', category: 'マスゲーム', plan: '隊形移動の確認', shifts: '3412,2401' },
            { id: 's4', date: '2026-09-03', category: 'マスコット', plan: '色塗り作業', shifts: '1105,2308,3109' },
        ];

        const Icons = {
            Menu: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>,
            X: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>,
            Pin: ({ size = 18, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.12-2.65A2 2 0 0 1 16 10.11V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v5.11a2 2 0 0 1-.44 1.24L5.44 14a2 2 0 0 0-.44 1.24Z"></path></svg>,
            Download: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            ChevronDown: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>,
            ChevronRight: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>,
            Lock: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Edit: ({ size = 16, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>,
            Plus: ({ size = 18, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>,
            Trash2: ({ size = 16, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Box: ({ size = 16, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>,
            ExternalLink: ({ size = 18, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>,
            ImageIcon: ({ size = 18, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>,
            RefreshCw: ({ size = 18, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            Save: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
            CheckCircle: ({ size = 24, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            AlertCircle: ({ size = 24, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Clock: ({ size = 12, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Calendar: ({ size = 20, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Search: ({ size = 16, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            User: ({ size = 16, className }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Spinner: ({ size = 24, className }) => <div className={`animate-spin rounded-full border-4 border-rose-200 border-t-rose-500 ${className}`} style={{ width: size, height: size }}></div>
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-6 right-6 left-6 md:left-auto z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl border animate-fade-in-up md:max-w-md ${
                    type === 'success' ? 'bg-white border-green-100 text-green-700' : 'bg-white border-red-100 text-red-700'
                }`}>
                    {type === 'success' ? <Icons.CheckCircle className="text-green-500" size={24} /> : <Icons.AlertCircle className="text-red-500" size={24} />}
                    <span className="font-bold text-sm flex-1">{message}</span>
                    <button onClick={onClose} className="ml-2 text-gray-400 hover:text-gray-600"><Icons.X size={16}/></button>
                </div>
            );
        };

        const PageHeader = ({ title, bgText }) => (
            <div className="relative pt-24 pb-12 overflow-hidden mb-8 flex justify-center items-center">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[5rem] md:text-[10rem] font-black text-rose-100/30 opacity-40 whitespace-nowrap select-none pointer-events-none z-0 tracking-tighter uppercase font-mono">
                    {bgText || title}
                </div>
                <div className="relative z-10 text-center px-4">
                    <h1 className="text-4xl md:text-6xl font-black text-gray-800 tracking-tight drop-shadow-sm">{title}</h1>
                    <div className="w-16 h-1.5 bg-gradient-to-r from-rose-400 to-pink-500 mx-auto mt-4 rounded-full"></div>
                </div>
            </div>
        );

        const AccordionItem = ({ title, subtitle, content, pinType, category, onCategoryClick, heading }) => {
            const [isOpen, setIsOpen] = useState(false);
            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                return dateStr.replace('T', ' ').substring(0, 16);
            };
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-rose-50 overflow-hidden transition-all duration-300 hover:shadow-md mb-4 group relative">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-rose-300 to-pink-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    <div className="w-full px-4 md:px-8 py-4 flex items-center justify-between text-left cursor-pointer" onClick={() => setIsOpen(!isOpen)}>
                        <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 flex-grow pr-3 min-w-0">
                            <div className="flex items-center gap-1.5 md:gap-3 shrink-0 flex-wrap">
                                {pinType === 'home' && <Icons.Pin size={16} className="text-rose-500 fill-rose-500 drop-shadow-sm shrink-0" />}
                                {pinType === 'local' && <Icons.Pin size={16} className="text-rose-300 shrink-0" />}
                                {category && (
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            if (onCategoryClick) onCategoryClick(category);
                                        }} 
                                        className="text-[10px] md:text-xs font-black tracking-wider px-2 py-0.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-full whitespace-nowrap transition-colors"
                                    >
                                        {category}
                                    </button>
                                )}
                                {heading && (
                                    <span className="text-[10px] md:text-xs font-bold tracking-wider px-2 py-0.5 bg-gray-100 text-gray-600 border border-gray-200/60 rounded-md whitespace-nowrap">
                                        {heading}
                                    </span>
                                )}
                                <span className="text-xs font-medium text-gray-400 font-mono">{formatDisplayDate(subtitle)}</span>
                            </div>
                            <div className="text-left font-bold text-gray-800 text-base md:text-lg leading-snug group-hover:text-rose-600 transition-colors truncate w-full">
                                {title}
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 bg-rose-50 p-2 rounded-full shrink-0 ${isOpen ? 'rotate-180 bg-rose-100 text-rose-600' : 'text-rose-400'}`}>
                            <Icons.ChevronDown size={16} />
                        </div>
                    </div>
                    <div className={`transition-all duration-300 ease-in-out px-4 md:px-8 text-gray-600 whitespace-pre-wrap text-sm md:text-base leading-relaxed ${isOpen ? 'py-5 border-t border-rose-100/50 max-h-[1000px] opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        {content}
                    </div>
                </div>
            );
        };

        // 学年ごとのシフト色分けロジック
        const getStudentBadgeClass = (idStr) => {
            const grade = String(idStr).trim().charAt(0);
            if (grade === '1') return 'bg-blue-50 text-blue-600 border-blue-200';
            if (grade === '2') return 'bg-red-50 text-red-600 border-red-200';
            if (grade === '3') return 'bg-green-50 text-green-600 border-green-200';
            return 'bg-gray-50 text-gray-600 border-gray-200';
        };

        // ==========================================
        // スケジュール表示用コンポーネント (シフト追加 ＆ 321年順並び替え対応)
        // ==========================================
        const ScheduleViewer = ({ schedules, category, isHomeMode = false, isFetching = false, onUpdateSchedule, onTriggerToast }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const [isExpanded, setIsExpanded] = useState(false);
            const [myNumber, setMyNumber] = useState(() => localStorage.getItem('edan_my_number') || '');
            const [isEditingMyNumber, setIsEditingMyNumber] = useState(false);
            const [tempMyNumber, setTempMyNumber] = useState(myNumber);
            const [loadingShiftId, setLoadingShiftId] = useState(null);

            const handleSaveMyNumber = (e) => {
                e.preventDefault();
                const formattedNum = tempMyNumber.trim();
                setMyNumber(formattedNum);
                localStorage.setItem('edan_my_number', formattedNum);
                setIsEditingMyNumber(false);
            };

            const handleToggleShift = async (schedule) => {
                if (!myNumber) {
                    if (onTriggerToast) onTriggerToast('先にマイ番号を登録してください', 'error');
                    return;
                }
                let shiftArr = schedule.shifts ? String(schedule.shifts).split(',').map(s => s.trim()).filter(Boolean) : [];
                const isAlreadyIn = shiftArr.includes(myNumber);
                if (isAlreadyIn) {
                    shiftArr = shiftArr.filter(s => s !== myNumber); // シフトから外れる
                } else {
                    shiftArr.push(myNumber); // シフトに入る
                }
                const newShiftsStr = shiftArr.join(',');
                const { shiftArr, isMatched, hasMyShift, ...cleanSchedule } = schedule;
const updatedSchedule = { ...cleanSchedule, shifts: newShiftsStr };
                
                setLoadingShiftId(schedule.id);
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'save', type: 'schedule', data: updatedSchedule })
                    });
                    const resText = await response.text();
                    const resJson = JSON.parse(resText);
                    if (resJson.status === 'success') {
                        if (onUpdateSchedule) onUpdateSchedule(resJson.data);
                        if (onTriggerToast) onTriggerToast(isAlreadyIn ? 'シフトから外れました' : 'シフトに入りました！', 'success');
                    } else {
                        throw new Error('サーバーエラー');
                    }
                } catch (e) {
                    if (onTriggerToast) onTriggerToast('シフトの更新に失敗しました', 'error');
                } finally {
                    setLoadingShiftId(null);
                }
            };

            const sortedSchedules = useMemo(() => {
                let filtered = schedules;
                if (category) filtered = filtered.filter(s => s.category === category);
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                filtered = filtered.filter(s => new Date(s.date) >= today);

                return filtered.map(s => {
                    const rawShiftArr = s.shifts ? String(s.shifts).split(',').map(str => str.trim()).filter(Boolean) : [];
                    
                    // 自分（マイ番号）以外のメンバーを「3年 → 2年 → 1年」の降順に並び替え（同じ学年内は出席番号昇順）
                    const sortedOtherUsers = rawShiftArr.filter(num => num !== myNumber).sort((a, b) => {
                        const gradeA = a.charAt(0);
                        const gradeB = b.charAt(0);
                        if (gradeA !== gradeB) {
                            return gradeB.localeCompare(gradeA); // 学年の降順 (3 -> 2 -> 1)
                        }
                        return a.localeCompare(b); // 同学年内は昇順
                    });

                    // 自分がシフトにいる場合、先頭（一番左）に固定してマージする
                    let shiftArr = [];
                    if (myNumber && rawShiftArr.includes(myNumber)) {
                        shiftArr = [myNumber, ...sortedOtherUsers];
                    } else {
                        shiftArr = sortedOtherUsers;
                    }

                    const isMatched = searchQuery && rawShiftArr.includes(searchQuery.trim());
                    const hasMyShift = myNumber && rawShiftArr.includes(myNumber);

                    return { ...s, shiftArr, isMatched, hasMyShift };
                });
            }, [schedules, category, searchQuery, myNumber]);

            const { todaySchedules, upcomingSchedules } = useMemo(() => {
                const todayStr = new Date().toISOString().split('T')[0];
                const todayList = sortedSchedules.filter(s => s.date === todayStr);
                const upcomingList = sortedSchedules.filter(s => s.date !== todayStr).slice(0, 7);
                return { todaySchedules: todayList, upcomingSchedules: upcomingList };
            }, [sortedSchedules]);

            const renderScheduleRow = (s, isHighlight) => {
                const rowBg = s.hasMyShift 
                    ? 'bg-rose-50/40 border-l-4 border-l-rose-400' 
                    : isHighlight 
                        ? 'bg-amber-50/50 border-l-4 border-l-amber-400' 
                        : 'hover:bg-gray-50';

                return (
                    <div key={s.id} className={`flex flex-col sm:flex-row p-4 border-b border-gray-100 last:border-0 transition-all duration-300 ${rowBg}`}>
                        <div className="flex items-center gap-3 sm:w-1/3 shrink-0 mb-2 sm:mb-0 sm:mt-1">
                            <div className="bg-gray-100 text-gray-500 font-mono text-xs px-2 py-1 rounded-md shrink-0 border border-gray-200">
                                {s.date.replace('2026-', '').replace('-', '/')}
                            </div>
                            {/* ホーム画面、またはカテゴリーが制限されていない総合予定表ページのみカテゴリーバッジを表示 */}
                            {(isHomeMode || !category) && (
                                <span className="text-[10px] font-bold text-rose-500 tracking-wider px-2 py-0.5 bg-rose-50 rounded-full border border-rose-100">
                                    {s.category}
                                </span>
                            )}
                            {s.hasMyShift && (
                                <span className="text-[9px] font-black tracking-wider text-rose-500 bg-white border border-rose-200 px-1.5 py-0.5 rounded-full animate-pulse">
                                    自分のシフト
                                </span>
                            )}
                        </div>
                        <div className="flex-1 min-w-0 pr-4 sm:mt-1">
                            <div className={`text-sm md:text-base font-bold text-gray-800 ${s.hasMyShift ? 'text-rose-700' : isHighlight ? 'text-amber-700' : ''}`}>
                                {s.plan}
                            </div>
                        </div>
                        {s.category !== '全体' && (
